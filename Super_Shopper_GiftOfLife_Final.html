<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Super Shopper</title>
    <style>
        /* Pastel Minimalist Theme */
        * { box-sizing: border-box; }
        html { min-height: 100%; overflow-x: hidden; scroll-padding-top: 90px; -webkit-overflow-scrolling: touch; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #fdfaf6; color: #4a4a4a; user-select: none; min-height: 100dvh; overflow-x: hidden; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
        
        /* Navbar */
        #navbar { background: #b5ead7; color: #2c3e50; padding: calc(15px + env(safe-area-inset-top, 0px)) 30px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 15px rgba(0,0,0,0.05); width: 100%; max-width: 100vw; overflow: hidden; }
        #hamburger { font-size: 24px; cursor: pointer; background: none; border: none; color: #2c3e50; transition: 0.2s; }
        #hamburger:hover { transform: scale(1.1); }
        #nav-controls { display: flex; gap: 20px; align-items: center; }
        .nav-stat { font-size: 16px; font-weight: 700; background: rgba(255,255,255,0.6); padding: 8px 16px; border-radius: 12px; color: #2c3e50; }
        #cash-display { color: #2c3e50; }
        
        /* Cart Button & Modal */
        #btn-cart, .top-icon-btn { background: #ffdac1; color: #2c3e50; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 15px; transition: 0.2s; box-shadow: 0 4px 0 #e8c6af; }
        #btn-cart:hover, .top-icon-btn:hover { transform: translateY(2px); box-shadow: 0 2px 0 #e8c6af; }
        #btn-preorders { background: #c7ceea; box-shadow: 0 4px 0 #b5bcd6; }
        #btn-care { background: #e2f0cb; box-shadow: 0 4px 0 #cfe0b8; }
        #cart-modal, .contract-modal { display: none; position: fixed; top: 75px; right: 30px; background: white; color: #4a4a4a; width: 360px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); z-index: 300; padding: 25px; border: 2px solid #ffdac1; max-height: 70vh; overflow-y: auto; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px dashed #fdfaf6; padding-bottom: 12px; font-size: 15px; }
        .cart-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn { background: #e2f0cb; border: none; border-radius: 6px; cursor: pointer; padding: 5px 12px; font-weight: bold; color: #2c3e50; }
        .del-btn { background: #ff9aa2; color: white; border: none; border-radius: 6px; cursor: pointer; padding: 5px 10px; font-weight: bold; }
        
        #btn-buy { width: 100%; background: #b5ead7; color: #2c3e50; border: none; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; border-radius: 12px; transition: 0.2s; box-shadow: 0 4px 0 #a2d5c4; }
        
        /* Timer & Gift */
        #timer-display { color: #2c3e50; }
        #btn-gift { display: none; background: #c7ceea; color: #2c3e50; border: none; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 0 #b5bcd6; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
.contract-icon{display:inline-block;font-size:1.4em;}
.contract-icon.attention{animation:pulse 1.5s infinite;}

        /* Side Menu */
        #side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #fffaf0; border-right: 3px solid #ffdac1; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; padding-top: 80px; }
        #side-menu.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
        .menu-btn { display: block; width: 100%; padding: 18px 30px; color: #4a4a4a; text-decoration: none; font-size: 17px; font-weight: 600; border: none; background: none; text-align: left; cursor: pointer; border-bottom: 2px dashed #fdfaf6; transition: 0.2s; }
        .menu-btn:hover { background: #ffe5d9; padding-left: 35px; color: #2c3e50; }
        #close-menu { position: absolute; top: 15px; right: 25px; font-size: 35px; color: #ff9aa2; cursor: pointer; transition: 0.2s; font-weight: 700; }
        .save-status { padding: 14px 30px; color: #7f8c8d; font-size: 13px; font-weight: 700; line-height: 1.35; }

        /* Game Screens */
        .screen { display: none; padding: 40px; max-width: 1000px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h1 { border-bottom: 3px dashed #ffdac1; padding-bottom: 15px; color: #2c3e50; font-weight: 800; font-size: 32px; margin-top: 0; }
        p { color: #7f8c8d; font-size: 16px; line-height: 1.5; font-weight: 500; }

        /* Customer & Register Screen */
        #customer-area { display: flex; align-items: center; justify-content: center; gap: 15px; background: white; padding: 10px 20px; border-radius: 16px; margin-bottom: 15px; border: 2px solid #fdfaf6; width: max-content; margin-left: auto; margin-right: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        #customer-person { font-size: 45px; }
        #customer-mood { font-size: 35px; }

        #patience-container { width: 100%; background: #fdfaf6; height: 12px; border-radius: 6px; margin-bottom: 15px; border: 2px solid #e2f0cb; overflow: hidden; }
        #patience-bar { width: 100%; background: #b5ead7; height: 100%; transition: width 0.1s linear, background-color 0.5s; }
        
        #belt { background: #e2f0cb; height: 160px; border-radius: 16px; display: flex; align-items: center; padding: 15px; gap: 20px; overflow-x: auto; margin-bottom: 25px; border: 3px solid #d4e2bd; touch-action: pan-y; position: relative; }
        .belt-item { font-size: 45px; background: white; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 3px solid transparent; }
        .belt-item.scanned { opacity: 0.3; pointer-events: none; transform: scale(0.9); }
        .belt-item.selected-for-bin { border-color: #ff9aa2; transform: scale(1.1); background: #fff0f1; }
        
        #register-controls { display: flex; gap: 15px; align-items: center; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 2px solid #fdfaf6; flex-wrap: wrap; }
        .icon-btn { font-size: 16px; font-weight: 700; padding: 15px 20px; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s; }
        
        #btn-start { background: #2ecc71; color: white; box-shadow: 0 4px 0 #27ae60; font-size: 20px; padding: 15px 40px; }
        #btn-start:hover { transform: translateY(2px); box-shadow: 0 2px 0 #27ae60; }
        #btn-start.stop-mode { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
        #btn-start.stop-mode:hover { box-shadow: 0 2px 0 #c0392b; }

        #btn-scanner { background: #aec4e6; color: #2c3e50; box-shadow: 0 4px 0 #9cb2d4; }
        #btn-scanner.active { background: #aec4e6; color: #2c3e50; box-shadow: 0 4px 0 #9cb2d4; }
        #btn-scanner.faded { opacity: 0.4; pointer-events: none; box-shadow: none; transform: translateY(4px); }
        
        #btn-bin { background: #ff9aa2; color: white; box-shadow: 0 4px 0 #e88c94; display: none; }
        #btn-bin:hover { transform: translateY(2px); box-shadow: 0 2px 0 #e88c94; }

        #btn-tick { background: #fdfaf6; color: #bdc3c7; pointer-events: none; }
        #btn-tick.ready { background: #b5ead7; color: #2c3e50; pointer-events: auto; box-shadow: 0 4px 0 #a2d5c4; transform: scale(1.05); }
        
        #screen-total { font-size: 28px; font-family: 'Courier New', Courier, monospace; background: white; color: #2c3e50; padding: 12px 25px; border-radius: 12px; font-weight: 800; border: 3px solid #b5ead7; }

        /* Event Buttons (Police / Robber) */
        .event-btn { font-size: 16px; font-weight: 700; padding: 15px 20px; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s; display: none; margin-right: 10px; }
        #btn-pay-fine { background: #ffdac1; color: #2c3e50; box-shadow: 0 4px 0 #e8c6af; }
        #btn-police-basket { background: #b5ead7; color: #2c3e50; box-shadow: 0 4px 0 #a2d5c4; }
        #btn-refuse-police { background: #ff9aa2; color: white; box-shadow: 0 4px 0 #e88c94; }
        
        #btn-robber-tips { background: #c7ceea; color: #2c3e50; box-shadow: 0 4px 0 #b5bcd6; }
        #btn-robber-item { background: #ffdac1; color: #2c3e50; box-shadow: 0 4px 0 #e8c6af; }

        /* Tip Jar */
        #tip-jar { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:#fffaf0; padding:10px 20px; border-radius:12px; border:2px dashed #ffdac1; margin-left:auto; min-width:120px; }
        #tip-jar-label { font-size: 34px; line-height:1; margin-bottom:4px; font-weight: 800; color: #ff9aa2; text-transform: uppercase; letter-spacing: 1px; }
        #tip-amount { font-size: 22px; font-weight: 800; color: #2c3e50; margin: 5px 0; }
        #btn-collect-tips { background: #ffdac1; border: none; padding: 5px 15px; border-radius: 6px; font-weight: 700; color: #2c3e50; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 0 #e8c6af; font-size: 13px; }
        #btn-collect-tips:hover { transform: translateY(1px); box-shadow: 0 1px 0 #e8c6af; }
        #btn-collect-tips:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Custom Scanner Cursor */
        body.scanning-mode { cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🔫</text></svg>") 16 16, crosshair !important; }

        /* Styled Pastel Shelves */
        .shelf-container { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 14px 12px; padding: 14px 22px 30px; border-radius: 16px; min-height: 200px; background-size: auto; box-shadow: inset 0 8px 18px rgba(255,255,255,0.35), inset 0 -10px 20px rgba(0,0,0,0.05); }
        .wooden-shelf {
            background-color: #f6e2d3;
            background-image:
                linear-gradient(90deg, rgba(172, 116, 76, 0.28) 0 12px, transparent 12px calc(100% - 12px), rgba(172, 116, 76, 0.28) calc(100% - 12px)),
                repeating-linear-gradient(to bottom, transparent 0 96px, rgba(154, 95, 57, 0.42) 96px 106px, rgba(255,255,255,0.45) 106px 110px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.22) 0 18px, rgba(210, 153, 112, 0.20) 18px 38px);
            border: 5px solid #d7a884;
            border-bottom: 20px solid #b9825c;
        } 
        .metal-shelf {
            background-color: #eef2f7;
            background-image:
                linear-gradient(90deg, rgba(125, 137, 154, 0.32) 0 10px, transparent 10px calc(100% - 10px), rgba(125, 137, 154, 0.32) calc(100% - 10px)),
                repeating-linear-gradient(to bottom, transparent 0 96px, rgba(111, 126, 145, 0.48) 96px 106px, rgba(255,255,255,0.65) 106px 110px),
                repeating-linear-gradient(90deg, rgba(159, 174, 193, 0.32) 0 2px, transparent 2px 24px);
            border: 5px solid #b5bfcd;
            border-bottom: 20px solid #8f9caf;
        } 
        
        .product-card { position: relative; background: #fff; padding: 9px 7px 7px; border-radius: 10px; text-align: center; width: 80px; height: 82px; cursor: default; transition: 0.2s; border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .product-card:hover { border-color: #ffdac1; transform: translateY(-3px); }
        .product-card.selected { border: 3px solid #ff9aa2; background: #fff0f1; transform: scale(1.05); }
        .product-card-emoji { font-size: 25px; margin-bottom: 2px; }
        .product-price { font-weight: 700; color: #2c3e50; margin-top: 3px; font-size: 11px; background: #e2f0cb; border-radius: 6px; padding: 1px 2px; }
        .product-name { font-size: 10px; font-weight: 600; color: #7f8c8d; white-space: normal; overflow: hidden; line-height: 1.1; min-height: 2.2em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .sale-toggle { position: absolute; top: 5px; left: 5px; width: 23px; height: 23px; border: 2px solid #2ecc71; border-radius: 50%; background: white; color: transparent; font-size: 14px; font-weight: 900; line-height: 18px; cursor: pointer; transition: 0.15s; }
        .sale-toggle.available { background: #2ecc71; color: white; box-shadow: 0 2px 0 #27ae60; }
        .contract-bubble { position: absolute; top: -9px; right: 18px; min-width: 22px; height: 22px; padding: 0 5px; border-radius: 999px; background: #ff5a66; color: white; border: 3px solid white; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 12; }
        .contract-bubble.done { background: #2ecc71; color: white; }
        .discount-burst { position:absolute; top:-8px; right:-8px; width:42px; height:42px; background:#ff5a66; color:white; font-size:9px; font-weight:900; display:flex; align-items:center; justify-content:center; text-align:center; line-height:1; z-index:20;
        clip-path:polygon(50% 0%,62% 20%,85% 8%,75% 35%,100% 50%,75% 65%,85% 92%,62% 80%,50% 100%,38% 80%,15% 92%,25% 65%,0% 50%,25% 35%,15% 8%,38% 20%); }

        /* Quantity Badge */
        .qty-badge { position: absolute; top: -8px; right: -8px; background: #ff9aa2; color: #2c3e50; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border: 3px solid #fff; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Manager Office */
        .catalog-grid { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 30px; }
        .catalog-category-title { width: 100%; border-bottom: 3px dashed #ffdac1; margin-top: 25px; padding-bottom: 8px; color: #2c3e50; font-size: 22px; font-weight: 700; }
        .catalog-item { position:relative; overflow:visible; background: #fff; padding: 20px 15px; border-radius: 16px; text-align: center; width: 110px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .catalog-item:hover { border-color: #aec4e6; transform: translateY(-4px); }
        .contract-modal { padding-top: 20px; }
        .contract-card { border: 2px solid #fdfaf6; border-radius: 12px; padding: 12px; margin-bottom: 12px; background: #fffaf0; }
        .contract-title { display: flex; justify-content: space-between; gap: 10px; align-items: center; font-weight: 800; color: #2c3e50; margin-bottom: 8px; }
        .contract-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; border-bottom: 3px dashed #ffdac1; padding-bottom: 12px; margin-bottom: 14px; }
        .contract-header h2 { margin: 0; border: 0; padding: 0; font-size: 22px; color: #2c3e50; }
        .contract-timer { background: #fdfaf6; border: 2px solid #ffdac1; border-radius: 10px; padding: 6px 9px; font-weight: 900; color: #2c3e50; white-space: nowrap; font-size: 13px; }
        .contract-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 8px; }
        .contract-tile { position: relative; min-height: 62px; border-radius: 10px; background: white; border: 2px solid #fdfaf6; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 7px 4px 5px; }
        .contract-tile.done { border-color: #b5ead7; background: #f1fff9; }
        .contract-emoji { font-size: 24px; line-height: 1; }
        .contract-qty { position: absolute; top: -7px; right: -7px; min-width: 23px; height: 23px; border-radius: 999px; background: #ff5a66; border: 3px solid white; color: white; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
        .contract-tile.done .contract-qty { background: #2ecc71; }
        .contract-name { margin-top: 4px; max-width: 100%; color: #7f8c8d; font-size: 10px; line-height: 1.05; text-align: center; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .contract-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; justify-content:center; }
.delivery-reward { background:#2ecc71 !important; color:white !important; }
        .contract-action { border: none; border-radius: 8px; padding: 8px 12px; font-weight: 900; cursor: pointer; color: #2c3e50; background: #b5ead7; min-width: 70px; }
        .contract-action:disabled { opacity: 0.45; cursor: not-allowed; }
        .contract-action.secondary { background: #ffdac1; }
        .contract-action.danger { background: #ff5a66; color: white; }
        .stars { color: #f4b400; font-weight: 900; letter-spacing: 2px; }

        body.scanning-mode #belt { touch-action: pan-y; }

        @media (max-width: 760px) {
            html { scroll-padding-top: 132px; }
            #navbar {
                display: grid;
                grid-template-columns: auto 1fr;
                gap: 10px 12px;
                align-items: center;
                padding: calc(10px + env(safe-area-inset-top, 0px)) 12px 10px;
            }
            #hamburger {
                font-size: 18px;
                min-height: 42px;
                white-space: nowrap;
            }
            #navbar > div:nth-child(2) {
                font-size: 19px !important;
                text-align: right;
                min-width: 0;
            }
            #nav-controls {
                grid-column: 1 / -1;
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
                width: 100%;
                min-width: 0;
            }
            #btn-gift {
                grid-column: 1 / -1;
                width: 100%;
            }
            #btn-cart {
                grid-column: 1 / -1;
            }
            .nav-stat,
            #btn-cart,
            #btn-gift,
            .top-icon-btn {
                min-width: 0;
                max-width: 100%;
                width: 100%;
                padding: 9px 8px;
                font-size: 14px;
                text-align: center;
                white-space: normal;
                overflow-wrap: anywhere;
                line-height: 1.15;
            }
            #cart-modal,
            .contract-modal {
                left: 12px;
                right: 12px;
                top: calc(118px + env(safe-area-inset-top, 0px));
                width: auto;
                max-height: calc(100dvh - 145px);
                padding: 18px;
            }
            .cart-item {
                align-items: flex-start;
                gap: 10px;
            }
            .cart-controls {
                flex-shrink: 0;
            }
            #side-menu {
                width: min(82vw, 280px);
                left: min(-82vw, -280px);
                height: 100dvh;
                padding-top: calc(70px + env(safe-area-inset-top, 0px));
            }
            .screen {
                padding: 20px 14px 34px;
                max-width: 100%;
            }
            h1 {
                font-size: 26px;
                padding-bottom: 12px;
            }
            p {
                font-size: 14px;
            }
            #customer-area {
                width: fit-content;
                max-width: 100%;
                padding: 8px 16px;
            }
            #customer-person { font-size: 38px; }
            #customer-mood { font-size: 30px; }
            #belt {
                min-height: 134px;
                height: auto;
                flex-wrap: wrap;
                justify-content: center;
                overflow: visible;
                gap: 12px;
                padding: 12px;
            }
            .belt-item {
                font-size: 38px;
                padding: 12px;
            }
            #register-controls {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
                padding: 12px;
                align-items: stretch;
            }
            .icon-btn,
            .event-btn {
                width: 100%;
                min-height: 48px;
                padding: 12px 10px;
                font-size: 14px;
                margin-right: 0;
                white-space: normal;
            }
            #btn-start,
            #screen-total,
            #btn-tick,
            #tip-jar {
                grid-column: span 2;
            }
            #btn-start {
                font-size: 18px;
                padding: 13px 16px;
            }
            #screen-total {
                text-align: center;
                font-size: 24px;
                padding: 10px 14px;
            }
            #tip-jar {
                margin-left: 0;
                min-width: 0;
                padding: 10px;
            }
            .shelf-container,
            .catalog-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
                gap: 12px;
                padding: 16px;
                width: 100%;
            }
            .shelf-container {
                grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
            }
            .catalog-grid {
                padding: 0;
            }
            .catalog-category-title {
                grid-column: 1 / -1;
                font-size: 19px;
                margin-top: 20px;
            }
            .catalog-item {
                width: 100%;
                min-width: 0;
                padding: 14px 8px;
            }
            .product-card {
                width: 100%;
                min-width: 0;
                min-height: 94px;
            }
            .product-card-emoji {
                font-size: 30px;
            }
            .product-name {
                white-space: normal;
                line-height: 1.2;
                min-height: 2.4em;
            }
        }

        @media (max-width: 390px) {
            #register-controls {
                grid-template-columns: 1fr;
            }
            #btn-start,
            #screen-total,
            #btn-tick,
            #tip-jar {
                grid-column: auto;
            }
            .catalog-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .shelf-container {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }
        
    </style>
</head>
<body>

    <!-- Navbar -->
    <div id="navbar">
        <button id="hamburger" onclick="toggleMenu()">☰ Menu</button>
        <div style="font-size: 28px; font-weight: 900; letter-spacing: 1px; color: #2c3e50; font-family: "Trebuchet MS", "Comic Sans MS", cursive; text-shadow: 2px 2px 0 #ffdac1; margin-left:12px;">🛒 Super Shopper</div>
        <div id="nav-controls">
            <button id="btn-gift" onclick="collectDelivery()">📦 Receive Stock</button>

function isDeliveryDiscountItem(productName) {
    if (!preOrder) return false;
    return preOrder.items.some(item => item.name === productName);
}
function getSupplierCost(product) {
    return isDeliveryDiscountItem(product.name) ? +(product.cost * 0.8).toFixed(2) : product.cost;
}

function updateTipJarDisplay() {
    const icon = document.getElementById('tip-jar-label');
    const btn = document.getElementById('btn-collect-tips');
    const amount = document.getElementById('tip-amount');
    if (!btn) return;
    if (icon) icon.textContent = '💰';
    const valueText = '$' + Number(tipTotal || 0).toFixed(2);
    btn.textContent = valueText;
    btn.innerText = valueText;
    btn.value = valueText;
    if (amount) amount.innerText = valueText;
}


function openGiftBasket(type){
    if(type==='police'){
        const choice = prompt('Police Basket\\nType DONUTS or CHAMPAGNE');
        if(!choice) return;
        const c = choice.toLowerCase().trim();
        if(c==='donuts' || c==='donut'){
            handlePolice('donuts');
        }else if(c==='champagne'){
            handlePolice('champagne');
        }
    }else if(type==='taxman'){
        const choice = prompt('Tax Man Basket\\nType SPECTACLES');
        if(!choice) return;
        const c = choice.toLowerCase().trim();
        if(c==='spectacles'){
            giftSpectacles++;
            alert('Spectacles gifted.');
        }
    }else if(type==='robber' && typeof handleRobber==='function'){
        handleRobber('basket');
    }
}

                giftChampagne,
                giftSpectacles
            };
            
            localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
            updateSaveStatus('Progress saved.');
            playTick();
            
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
        }

        function loadProgress(showMessage = true) {
            const rawSave = localStorage.getItem(SAVE_KEY);
            if (!rawSave) {
                if (showMessage) updateSaveStatus('No save found.');
                return false;
            }

            try {
                const saveData = JSON.parse(rawSave);
                cash = Number(saveData.cash ?? 100);
                tipTotal = Number(saveData.tipTotal ?? 0);
                inventory = Array.isArray(saveData.inventory) ? saveData.inventory : [];
                cart = Array.isArray(saveData.cart) ? saveData.cart : [];
                deliveryBox = Array.isArray(saveData.deliveryBox) ? saveData.deliveryBox : [];
                deliveryTimer = Number(saveData.deliveryTimer ?? 0);
                policePending = Boolean(saveData.policePending);
                policeTurnsLeft = Number(saveData.policeTurnsLeft ?? 0);
                preOrder = saveData.preOrder || null;
                nextPreOrderAt = Number(saveData.nextPreOrderAt ?? 0);
                carePackages = Array.isArray(saveData.carePackages) ? saveData.carePackages : [];
                nextCarePackageAt = Number(saveData.nextCarePackageAt ?? 0);
                careStars = Number(saveData.careStars ?? 5);
                santaDeadline = saveData.santaDeadline ?? null;
                giftChampagne = Number(saveData.giftChampagne ?? 0);
                giftSpectacles = Number(saveData.giftSpectacles ?? 0);

                inventory.forEach(item => {
                    if (item.forSale === undefined) item.forSale = true;
                });
                initializeContracts();

                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('cash').innerText = cash.toFixed(2);
                document.getElementById('tip-amount').innerText = "$" + tipTotal.toFixed(2); updateTipJarDisplay();
                updateCartCount();
                renderCartModal();
                renderShelves();
                switchScreen('screen-register');
                stopShift();

                if (deliveryTimer > 0) {
                    startDeliveryTimer(deliveryTimer);
                } else if (deliveryBox.length > 0) {
                    document.getElementById('btn-gift').style.display = 'inline-block';
                } else {
                    document.getElementById('timer-display').innerText = '00:00';
                    document.getElementById('btn-gift').style.display = 'none';
                }

                updateSaveStatus(showMessage ? 'Save loaded.' : getSaveSummary(saveData.savedAt));
                renderContracts();
                if (showMessage) playPop();
                return true;
            } catch (error) {
                updateSaveStatus('Save could not be loaded.');
                return false;
            }
        }

        function clearSavedProgress() {
            if (!localStorage.getItem(SAVE_KEY)) {
                updateSaveStatus('No save to clear.');
                return;
            }

            if (!confirm('Clear your saved progress from this browser?')) return;
            localStorage.removeItem(SAVE_KEY);
            updateSaveStatus('Saved progress cleared.');
            playThwack();
        }

        function updateSaveStatus(message) {
            const status = document.getElementById('save-status');
            if (status) status.innerText = message;
        }

        function getSaveSummary(savedAt) {
            if (!savedAt) return 'Save available.';
            return 'Last save: ' + new Date(savedAt).toLocaleString();
        }

        function returnBeltItemsToInventory() {
            itemsBoughtThisTurn.forEach(item => {
                if (item.binned) return;
                let existing = inventory.find(invItem => invItem.name === item.name);
                if (existing) existing.qty++;
                else inventory.push({
                    emoji: item.emoji,
                    name: item.name,
                    price: item.price,
                    cost: item.cost,
                    category: item.category,
                    qty: 1,
                    forSale: true
                });
            });

            itemsBoughtThisTurn = [];
            currentOrderTotal = 0;
            clearInterval(patienceInterval);
            renderShelves();
            renderCatalog();
        }

        // --- BULK DELIVERY & CARE PACKAGE CONTRACTS ---
        function initializeContracts() {
            const now = Date.now();
            if (!nextPreOrderAt) nextPreOrderAt = now;
            if (!nextCarePackageAt) nextCarePackageAt = now;
            carePackages = carePackages.filter(Boolean);
            careStars = Math.max(0, Math.min(5, Number(careStars || 0)));
        }

        function tickContracts() {
            initializeContracts();
            const now = Date.now();

            if (!preOrder && now >= nextPreOrderAt) {
                preOrder = createContractPackage('delivery');
            }
            if (preOrder && now > preOrder.deadline) {
                preOrder = null;
                nextPreOrderAt = now + DAY_MS;
                updateSaveStatus('Daily Delivery expired.');
            }

            while (carePackages.length < 3 && now >= nextCarePackageAt) {
                carePackages.push(createContractPackage('care'));
                nextCarePackageAt += 1 * HOUR_MS;
            }
            if (carePackages.length >= 3 && now >= nextCarePackageAt) {
                nextCarePackageAt = now + 1 * HOUR_MS;
            }

            carePackages = carePackages.filter(pkg => {
                if (now <= pkg.deadline) return true;
                loseCareStar();
                return false;
            });

            if (careStars <= 0 && !santaDeadline) {
                santaDeadline = now + HOUR_MS;
            }
            if (santaDeadline && now > santaDeadline) {
                applyTaxMan();
            }

            renderContracts();
            renderShelves();
            renderCatalog();
        }

        function createContractPackage(type) {
            const isCare = type === 'care';
            const pool = productDB.filter(item => isCare ? item.category !== 'Eighteen' : true);
            const itemCount = isCare ? 3 : 5;
            const chosen = [];
            const used = new Set();

            while (chosen.length < itemCount && used.size < pool.length) {
                const product = pool[Math.floor(Math.random() * pool.length)];
                if (used.has(product.name)) continue;
                used.add(product.name);
                chosen.push({
                    emoji: product.emoji,
                    name: product.name,
                    qty: isCare ? randInt(1, 4) : randInt(5, 12),
                    price: product.price,
                    cost: product.cost,
                    category: product.category
                });
            }

            const value = chosen.reduce((sum, item) => sum + item.price * item.qty, 0);
            return {
                id: type + '-' + Date.now() + '-' + Math.floor(Math.random() * 10000),
                type,
                createdAt: Date.now(),
                deadline: Date.now() + (isCare ? 1 * HOUR_MS : DAY_MS),
                reward: isCare ? 10 : Math.round(value * 1.45),
                items: chosen
            };
        }

        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function toggleContractModal(id) {
            ['cart-modal', 'preorder-modal', 'care-modal'].forEach(modalId => {
                const modal = document.getElementById(modalId);
                if (modalId !== id) modal.style.display = 'none';
            });
            const modal = document.getElementById(id);
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            renderContracts();
            playTick();
        }

        function renderContracts() {
            renderPreOrder();
            renderCarePackages();
            document.getElementById('btn-preorders').innerHTML =
                `<span class="contract-icon ${preOrder ? 'attention' : ''}">🚚</span>`;

            document.getElementById('btn-care').innerHTML =
                `<span class="contract-icon ${carePackages.length > 0 ? 'attention' : ''}">🫂</span>`;
        }

        function renderPreOrder() {
            const content = document.getElementById('preorder-content');
            if (!content) return;

            if (!preOrder) {
                content.innerHTML = `<div class="contract-header"><h2>Daily Delivery</h2><div class="contract-timer">${formatDuration(Math.max(0, nextPreOrderAt - Date.now()))}</div></div>
                    <p>Next bulk delivery request is on the way.</p>`;
                return;
            }

            content.innerHTML = `<div class="contract-header"><h2>Daily Delivery</h2><div class="contract-timer">${formatDuration(Math.max(0, preOrder.deadline - Date.now()))}</div></div>
                ${renderContractCard(preOrder, '', true)}`;
        }

        function renderCarePackages() {
            const content = document.getElementById('care-content');
            if (!content) return;

            const stars = '★'.repeat(careStars) + '☆'.repeat(5 - careStars);
            let html = `<div class="contract-header"><h2>Care Packages</h2><div class="contract-timer">Next ${formatDuration(Math.max(0, nextCarePackageAt - Date.now()))}</div></div>
                <div class="contract-card"><div class="contract-title"><span>Kindness Rating</span><span class="stars">${stars}</span></div>`;
            if (careStars <= 0) {
                html += `<div style="color:#7f8c8d; font-size:14px;">Santa's Helper needed: donate $50 of inventory value within ${formatDuration(Math.max(0, santaDeadline - Date.now()))}.</div>
                    <div class="contract-actions"><button class="contract-action" onclick="makeSantaHelperPackage()">Make Santa's Helper Package</button></div>`;
            } else {
                html += `<div style="color:#7f8c8d; font-size:14px;">Care Packages pay $10 gratitude while you have at least 1 star.</div>`;
            }
            html += `</div>`;

            if (carePackages.length === 0) {
                html += `<p>No active packages right now.</p>`;
            } else {
                html += carePackages.map((pkg, i) => renderContractCard(pkg, `Care Package ${i + 1}`, false)).join('');
            }

            content.innerHTML = html;
        }

        function renderContractCard(pkg, title, isPreOrder) {
            const ready = canCompleteContract(pkg);
            const itemsHtml = pkg.items.map(item => {
                const have = getInventoryQty(item.name);
                const remaining = Math.max(item.qty - have, 0);
                return `<div class="contract-tile ${remaining === 0 ? 'done' : ''}" title="${item.name}: ${Math.min(have, item.qty)}/${item.qty}">
                    <div class="contract-qty">${remaining === 0 ? '★' : remaining}</div>
                    <div class="contract-emoji">${item.emoji}</div>
                    <div class="contract-name">${item.name}</div>
                </div>`;
            }).join('');

            const completeAction = isPreOrder
                ? `<button class="contract-action delivery-reward" onclick="completePreOrder()" ${ready ? '' : 'disabled'}>$${pkg.reward}</button>`
                : `<button class="contract-action" onclick="completeCarePackage('${pkg.id}')" ${ready ? '' : 'disabled'}>$${careStars > 0 ? pkg.reward : 0}</button>`;
            const cancelAction = isPreOrder
                ? ''
                : `<button class="contract-action danger" onclick="denyCarePackage('${pkg.id}')">Decline</button>`;

            return `<div class="contract-card">
                ${title ? `<div class="contract-title"><span>${title}</span></div>` : ''}
                <div class="contract-items">${itemsHtml}</div>
                <div class="contract-actions">${completeAction}${cancelAction}</div>
            </div>`;
        }

        function getInventoryQty(name) {
            const item = inventory.find(invItem => invItem.name === name);
            return item ? item.qty : 0;
        }

        function canCompleteContract(pkg) {
            return pkg.items.every(item => getInventoryQty(item.name) >= item.qty);
        }

        function completePreOrder() {
            if (!preOrder || !canCompleteContract(preOrder)) return;
            consumeContractItems(preOrder);
            cash += preOrder.reward;
            document.getElementById('cash').innerText = cash.toFixed(2);
            preOrder = null;
            nextPreOrderAt = Date.now() + DAY_MS;
            updateSaveStatus('Daily Delivery completed.');
            playCoinDrop();
            renderContracts();
            renderShelves();
            renderCatalog();
        }

        function completeCarePackage(id) {
            const pkg = carePackages.find(packageItem => packageItem.id === id);
            if (!pkg || !canCompleteContract(pkg)) return;
            consumeContractItems(pkg);
            if (careStars > 0) cash += pkg.reward;
            document.getElementById('cash').innerText = cash.toFixed(2);
            carePackages = carePackages.filter(packageItem => packageItem.id !== id);
            updateSaveStatus('Care Package completed.');
            playTipSound();
            renderContracts();
            renderShelves();
            renderCatalog();
        }

        function denyCarePackage(id) {
            carePackages = carePackages.filter(packageItem => packageItem.id !== id);
            loseCareStar();
            updateSaveStatus('Care Package crossed out.');
            playThwack();
            renderContracts();
            renderShelves();
            renderCatalog();
        }

        function loseCareStar() {
            careStars = Math.max(0, careStars - 1);
            if (careStars === 0 && !santaDeadline) {
                santaDeadline = Date.now() + HOUR_MS;
            }
        }

        function consumeContractItems(pkg) {
            pkg.items.forEach(item => removeInventoryQty(item.name, item.qty));
            renderShelves();
            renderCatalog();
        }

        function removeInventoryQty(name, qty) {
            let needed = qty;
            for (let i = inventory.length - 1; i >= 0 && needed > 0; i--) {
                if (inventory[i].name !== name) continue;
                const take = Math.min(inventory[i].qty, needed);
                inventory[i].qty -= take;
                needed -= take;
                if (inventory[i].qty <= 0) inventory.splice(i, 1);
            }
        }

        function makeSantaHelperPackage() {
            if (getInventoryValue() < 50) {
                alert("You need at least $50 of inventory value for Santa's Helper.");
                return;
            }

            let valueNeeded = 50;
            for (let i = inventory.length - 1; i >= 0 && valueNeeded > 0; i--) {
                while (inventory[i] && inventory[i].qty > 0 && valueNeeded > 0) {
                    inventory[i].qty--;
                    valueNeeded -= inventory[i].price;
                }
                if (inventory[i] && inventory[i].qty <= 0) inventory.splice(i, 1);
            }

            careStars = 5;
            santaDeadline = null;
            updateSaveStatus("Santa's Helper package restored your stars.");
            playDeliveryChime();
            renderContracts();
            renderShelves();
            renderCatalog();
        }

        function getInventoryValue() {
            return inventory.reduce((sum, item) => sum + item.price * item.qty, 0);
        }

        function applyTaxMan() {

            if (giftSpectacles > 0) {

                if (confirm("Offer Spectacles to the Tax Man?")) {

                    giftSpectacles--;

                    if (Math.random() < 0.5) {
                        santaDeadline = null;
                        careStars = 2;

                        alert("The Tax Man laughs and lets it slide.");
                        return;
                    }

                    cash = Math.max(0, cash - 1000);
                    document.getElementById('cash').innerText = cash.toFixed(2);

                    santaDeadline = null;
                    careStars = 2;

                    alert("The Tax Man thinks you're mocking him.\n\nFine: $1000");
                    return;
                }
            }


            cash -= 500;
            document.getElementById('cash').innerText = cash.toFixed(2);
            addInventoryByName('Bread', 10);
            addInventoryByName('Milk Glass', 20);
            addInventoryByName('Tomato', 5);
            addInventoryByName('Eggs', 15);
            careStars = 2;
            santaDeadline = null;
            updateSaveStatus('The Tax Man charged you $500 and left emergency stock.');
            renderShelves();
            playThwack();
            alert('The Tax Man came! You were charged $500, but received essential groceries cause he is nice.');
        }

        function addInventoryByName(name, qty) {
            const product = productDB.find(item => item.name === name);
            if (!product) return;
            let existing = inventory.find(item => item.name === name);
            if (existing) existing.qty += qty;
            else inventory.push({ ...product, qty, forSale: true });
        }

        function getContractBubble(name) {
            const packages = [];
            if (preOrder) packages.push(preOrder);
            packages.push(...carePackages);
            const required = packages.reduce((sum, pkg) => {
                const item = pkg.items.find(pkgItem => pkgItem.name === name);
                return sum + (item ? item.qty : 0);
            }, 0);
            if (required <= 0) return '';
            const remaining = Math.max(required - getInventoryQty(name), 0);
            return remaining === 0
                ? '<div class="contract-bubble done">★</div>'
                : `<div class="contract-bubble">${remaining}</div>`;
        }

        function formatDuration(ms) {
            const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }

        // --- SHIFT CONTROLS ---
        function toggleShift() {
            if (isShiftStarted) {
                // Penalties for closing register during an event
                if (currentCustomerType === 'robber') {
                    alert("The robber snatched your tip jar while you were closing the register!");
                    tipTotal = 0;
                    document.getElementById('tip-amount').innerText = "$0.00";
                } else if (currentCustomerType === 'police') {
                    alert("You can't close the register on the police! They'll be back immediately.");
                    policeTurnsLeft = 0;

                stopShift();
            } else {
                startShift();
            }
        }

        // --- NAVIGATION ---
        function toggleMenu() { 
            document.getElementById('side-menu').classList.toggle('open'); 
            playTick();
        }
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            renderShelves();
            playTick();
            
            // Force shift stop if leaving the register screen

        // --- CART & ORDERING LOGIC ---
        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            const categorySelect = document.getElementById('catalog-category-filter');
            const search = (document.getElementById('catalog-search')?.value || '').toLowerCase();
            const sortMode = document.getElementById('catalog-sort-filter')?.value || 'default';

            const categories = [...new Set(productDB.map(p => p.category))];

            if (categorySelect && categorySelect.options.length === 1) {
                categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.textContent = cat;
                    categorySelect.appendChild(opt);
                });
            }

            const selectedCategory = categorySelect?.value || 'All';
            let html = '';

            let filtered = productDB
                .map((p, i) => ({...p, originalIndex:i}))
                .filter(p =>
                    (selectedCategory === 'All' || p.category === selectedCategory) &&
                    p.name.toLowerCase().includes(search)
                );

            if (sortMode === 'low-high') filtered.sort((a,b)=>a.cost-b.cost);
            if (sortMode === 'high-low') filtered.sort((a,b)=>b.cost-a.cost);

            if (selectedCategory === 'All') {
                categories.forEach(cat => {
                    const catItems = filtered.filter(p=>p.category===cat);
                    if (!catItems.length) return;

                    let color = cat === 'Eighteen' ? '#ff9aa2' : '#ffdac1';
                    html += `<h2 class="catalog-category-title" style="border-color:${color}">${cat}</h2>`;

                    catItems.forEach(p => {
                        html += `
                        <div class="catalog-item" onclick="addToCart(${p.originalIndex})">
                            <div class="product-card-emoji">${p.emoji}</div>
                            <div class="product-name">${p.name}</div>
                            ${isDeliveryDiscountItem(p.name)?`<div class="discount-burst">20%<br>OFF</div><small style="display:block;text-decoration:line-through;color:#999;">$${p.cost.toFixed(2)}</small>`:''}
                            <small style="color:#ff9aa2;font-weight:700;">$${(isDeliveryDiscountItem(p.name)?getSupplierCost(p):p.cost).toFixed(2)}</small>
                        </div>`;
                    });
                });
            } else {
                filtered.forEach(p => {
                    html += `
                    <div class="catalog-item" onclick="addToCart(${p.originalIndex})">
                        <div class="product-card-emoji">${p.emoji}</div>
                        <div class="product-name">${p.name}</div>
                        ${isDeliveryDiscountItem(p.name)?`<div class="discount-burst">20%<br>OFF</div><small style="display:block;text-decoration:line-through;color:#999;">$${p.cost.toFixed(2)}</small>`:''}
                        <small style="color:#ff9aa2;font-weight:700;">$${(isDeliveryDiscountItem(p.name)?getSupplierCost(p):p.cost).toFixed(2)}</small>
                    </div>`;
                });
            }

            grid.innerHTML = html;
        }

        function addToCart(index) {
            let item = productDB[index];
            let existing = cart.find(c => c.name === item.name);
            if(existing) existing.qty++;
            else cart.push({ ...item, qty: 1 });
            playPop(); 
            updateCartCount();
            renderCartModal();
        }

        function updateCartQty(index, delta) {
            cart[index].qty += delta;
            if(cart[index].qty <= 0) cart.splice(index, 1);
            playTick();
            updateCartCount();
            renderCartModal();
        }

        function removeCartItem(index) {
            cart.splice(index, 1);
            playTick();
            updateCartCount();
            renderCartModal();
        }

        function updateCartCount() {
            let totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = totalItems;
        }

        function toggleCart() {
            document.getElementById('preorder-modal').style.display = 'none';
            document.getElementById('care-modal').style.display = 'none';
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            playTick();
        }

        function renderCartModal() {
            const itemsDiv = document.getElementById('cart-items');
            let total = 0;
            itemsDiv.innerHTML = cart.map((item, i) => {
                let lineCost = getSupplierCost(item) * item.qty;
                total += lineCost;
                return `
                <div class="cart-item">
                    <span style="font-weight: 600;">${item.emoji} ${item.name} <span style="color:#7f8c8d">($${lineCost.toFixed(2)})</span></span>
                    <div class="cart-controls">
                        <button class="qty-btn" onclick="updateCartQty(${i}, -1)">-</button>
                        <span style="font-weight:700; width: 20px; text-align:center;">${item.qty}</span>
                        <button class="qty-btn" onclick="updateCartQty(${i}, 1)">+</button>
                        <button class="del-btn" onclick="removeCartItem(${i})">×</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = "$" + total.toFixed(2);
        }

        function buyCart() {
            let totalCost = cart.reduce((sum, item) => sum + (getSupplierCost(item) * item.qty), 0);
            if (cart.length === 0) return alert("Cart is empty!");
            if (cash >= totalCost) {
                if(deliveryTimer > 0) return alert("A delivery is already on the way!");
                cash -= totalCost;
                document.getElementById('cash').innerText = cash.toFixed(2);
                cart.forEach(item => {
                    for(let i=0; i<item.qty; i++) {
                        deliveryBox.push({ emoji: item.emoji, name: item.name, price: item.price, cost: item.cost, category: item.category });
                    }
                });
                cart = [];
                updateCartCount();
                renderCartModal();
                toggleCart();
                playCoinDrop();
                startDeliveryTimer(10); 
            } else {
                alert("Not enough cash!");
            }
        }

        // --- TIMER LOGIC ---
        function startDeliveryTimer(seconds) {
            deliveryTimer = seconds;
            document.getElementById('btn-gift').style.display = 'none';
            timerInterval = setInterval(() => {
                deliveryTimer--;
                let mins = Math.floor(deliveryTimer / 60).toString().padStart(2, '0');
                let secs = (deliveryTimer % 60).toString().padStart(2, '0');

        // --- AUDIO ENGINE ---
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        const audioCtx = AudioContextClass ? new AudioContextClass() : null;
        
        function playTone(freq, type, duration, vol) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
            return osc;
        }

        function playBeep() { playTone(800, 'sine', 0.1, 0.1); }
        function playPop() {
            let osc = playTone(600, 'sine', 0.1, 0.1);
            if (!osc) return;
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
        }
        function playTick() { playTone(1200, 'square', 0.05, 0.02); }
        function playThwack() {
            let osc = playTone(200, 'triangle', 0.15, 0.1);
            if (!osc) return;
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
        }
        function playCoinDrop() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(2500, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
        function playTipSound() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playTone(1046.50, 'sine', 0.2, 0.1); 
            setTimeout(() => playTone(1318.51, 'sine', 0.4, 0.1), 100); 
        }
        function playDeliveryChime() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playTone(523.25, 'sine', 0.3, 0.1); 
            setTimeout(() => playTone(659.25, 'sine', 0.3, 0.1), 150); 
            setTimeout(() => playTone(783.99, 'sine', 0.5, 0.1), 300); 
        }

        // Start Game
        init();
    </script>
