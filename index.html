        function updateRobberTile(idx){
            const item=robberEligible[idx];
            const qty=window.robberBasketSelection[idx]||0;
            document.getElementById('rb-badge-'+idx).textContent=qty;
            document.getElementById('rb-qty-'+idx).textContent=`(${qty}/${item.qty})`;
            document.getElementById('rb-item-'+idx).classList.toggle('selected',qty>0);
        }

        function incrementRobberItem(idx){
            const item=robberEligible[idx];
            const current=window.robberBasketSelection[idx]||0;

            let total = 0;
            Object.values(window.robberBasketSelection||{}).forEach(q => total += q);
            if(total >= 5) {
                customAlert('Basket is full (Max 5 items).');
                return;
            }

            window.robberBasketSelection[idx]=Math.min(current+1,item.qty);
            updateRobberTile(idx);
        }

        function decrementRobberItem(idx){
            const current=window.robberBasketSelection[idx]||0;
            window.robberBasketSelection[idx]=Math.max(0,current-1);
            updateRobberTile(idx);
        }

        function declineRobberBasket(){ 
            setTimeout(() => customAlert('Since you did not have any suitable items, the robber emptied your tip jar.'), 50); 
            tipTotal=0; 
            updateTipJarDisplay(); 
            document.getElementById('robber-basket-modal').style.display='none'; 
            generateCustomerBelt(); 
        }

        function submitRobberBasket(){
            const picks=[];
            Object.entries(window.robberBasketSelection||{}).forEach(([idx,qty])=>{
                if(qty>0)picks.push({item:robberEligible[idx],qty});
            });

            let total=picks.reduce((s,p)=>s+p.qty,0);

            if(total === 0){ 
                customAlert('You must select at least 1 item.'); 
                return; 
            }

            picks.forEach(p=>{
                let inv=inventory.find(x=>x.name===p.item.name);
                if(inv) inv.qty-=p.qty;
            });

            let exactMatch = picks.find(p => p.item.name === robberDemandedItem.name);
            let gaveBreadOrMilk = picks.find(p => p.item.name === 'Bread' || p.item.name === 'Milk');
            let firstWrong = picks.find(p => p.item.name !== robberDemandedItem.name && p.item.name !== 'Bread' && p.item.name !== 'Milk');

            if(exactMatch && !firstWrong) {
                playThwack();
            } else if (gaveBreadOrMilk && !firstWrong && !exactMatch) {
                robberReformed=true;
                robberReturnTurn=turnCounter+12;
                robberGiftType= gaveBreadOrMilk.item.name.toLowerCase();
                playPop();
            } else {
                tipTotal=0;
                updateTipJarDisplay();
                addInventoryByName('Spectacles', 1);
                
                let heading = "The robber left you a pair of specs.";
                let msg = `Maybe next time you won't mistake ${robberDemandedItem.name} for another item.`;
                
                setTimeout(()=> {
                    customAlert(`<h3 style="margin-top:0;color:#e74c3c;">${heading}</h3><p>${msg}</p>`);
                }, 50);
                playThwack();
            }

            inventory=inventory.filter(i=>i.qty>0);
            renderShelves();
            document.getElementById('robber-basket-modal').style.display='none';
            generateCustomerBelt();
        }

        function acceptCeoGift() {
            tipTotal += 100;
            addInventoryByName('Champagne', 1);
            robberReformed = false;
            
            customAlert("The CEO-turned-robber left you a bottle of champagne and a 100 dollar tip.");
            
            updateTipJarDisplay();
            generateCustomerBelt();
        }

        // --- REGISTER LOGIC & TOUCH SCREEN SCANNER ---
        function generateCustomerBelt() {
            if(!isShiftStarted) return;
            
            const belt = document.getElementById('belt');
            belt.innerHTML = '';
            currentOrderTotal = 0;
            document.getElementById('screen-total').innerText = "$0.00";
            document.getElementById('btn-scanner').classList.remove('faded', 'active');
            document.getElementById('btn-bin').style.display = 'none';
            document.getElementById('btn-tick').classList.remove('ready');
            setTipCollectionLocked(false);
            
            // Hide Event Buttons, show normal controls
            document.querySelectorAll('.event-btn').forEach(btn => btn.style.display = 'none');
            document.getElementById('btn-scanner').style.display = 'block';
            document.getElementById('screen-total').style.display = 'block';
            document.getElementById('btn-tick').style.display = 'block';
            
            isScanning = false;
            document.body.classList.remove('scanning-mode');
            selectedBeltItem = null;
            hasSoldRestrictedToChild = false;
            itemsBoughtThisTurn = [];
            
            clearInterval(patienceInterval);
            document.getElementById('patience-bar').style.width = '100%';
            document.getElementById('patience-bar').style.backgroundColor = '#b5ead7';
            
            // Turn Logic
            if (policeTurnsLeft > 0) policeTurnsLeft--;
            
            if (policePending && policeTurnsLeft <= 0) {
                currentCustomerType = 'police';
            } else if (robberReformed && turnCounter >= robberReturnTurn) {
                currentCustomerType = 'ceo';
            } else {
                let rand = Math.random();
                if (rand < 0.20) currentCustomerType = 'robber';
                else if (rand < 0.40) currentCustomerType = 'child';
                else currentCustomerType = 'adult';
            }

            // Handle Events
            if (currentCustomerType === 'ceo') {
                document.getElementById('customer-person').innerText = Math.random() < 0.5 ? '👨‍💼' : '👩‍💼';
                document.getElementById('customer-mood').innerText = '💼';
                belt.innerHTML = `<div style="width:100%; text-align:center; color:#2ecc71; font-size:22px; font-weight:800;">"Remember when I came to rob you and you gave me a ${robberGiftType}? You changed my life!"</div>`;
                
                document.getElementById('btn-scanner').style.display = 'none';
                document.getElementById('screen-total').style.display = 'none';
                document.getElementById('btn-tick').style.display = 'none';
                document.getElementById('btn-ceo-accept').style.display = 'block';
                return;
            }

            if (currentCustomerType === 'police') {
                document.getElementById('customer-person').innerText = policeEmoji;
                document.getElementById('customer-mood').innerText = '🤬';
                belt.innerHTML = '<div style="width:100%; text-align:center; color:#e74c3c; font-size:22px; font-weight:800;">"You sold restricted items to a minor! Pay $50 fine OR give me 10 Donuts!"</div>';
                
                document.getElementById('btn-scanner').style.display = 'none';
                document.getElementById('screen-total').style.display = 'none';
                document.getElementById('btn-tick').style.display = 'none';
                document.getElementById('btn-pay-fine').style.display = 'block';
                document.getElementById('btn-police-basket').style.display = 'block';
                return;
            }
            
            if (currentCustomerType === 'robber') {
                let restrictedItems = productDB.filter(p => p.category === 'Eighteen' && p.name !== 'Champagne');
                robberDemandedItem = restrictedItems[Math.floor(Math.random() * restrictedItems.length)];
                
                document.getElementById('customer-person').innerText = robberEmoji;
                document.getElementById('customer-mood').innerText = '😠';
                belt.innerHTML = `<div style="width:100%; text-align:center; color:#2c3e50; font-size:22px; font-weight:800;">"Hand over all your Tips OR give me ${robberDemandedItem.name} ${robberDemandedItem.emoji}!"</div>`;
                
                document.getElementById('btn-scanner').style.display = 'none';
                document.getElementById('screen-total').style.display = 'none';
                document.getElementById('btn-tick').style.display = 'none';
                setTipCollectionLocked(true);
                
                document.getElementById('btn-robber-tips').style.display = 'block';
                let btnBasket = document.getElementById('btn-robber-basket');
                if (btnBasket) {
                    btnBasket.innerText = '🧺 Basket';
                    btnBasket.style.display = 'block';
                }
                return;
            }

            // Normal Adult or Child
            if (currentCustomerType === 'child') {
                document.getElementById('customer-person').innerText = childEmojis[Math.floor(Math.random() * childEmojis.length)];
                document.getElementById('customer-mood').innerText = '🔞';
            } else {
                document.getElementById('customer-person').innerText = adultEmojis[Math.floor(Math.random() * adultEmojis.length)];
                document.getElementById('customer-mood').innerText = '😁';
            }

            let saleItems = inventory.filter(item => item.forSale !== false && item.qty > 0 && item.category !== 'Gift of Life');

            if (saleItems.length === 0) {
                belt.innerHTML = '<div style="width:100%; text-align:center; color:#ff9aa2; font-size:18px; font-weight:700;">No items are marked for sale. Open My Inventory and tap green ticks to stock the register.</div>';
                document.getElementById('btn-scanner').classList.add('faded');
                document.getElementById('customer-mood').innerText = '😭';
                return;
            }

            let totalItemsOnShelves = saleItems.reduce((sum, item) => sum + item.qty, 0);
            let numItemsToBuy = Math.floor(Math.random() * 4) + 1;
            if (numItemsToBuy > totalItemsOnShelves) numItemsToBuy = totalItemsOnShelves;

            for (let i = 0; i < numItemsToBuy; i++) {
                saleItems = inventory.filter(item => item.forSale !== false && item.qty > 0 && item.category !== 'Gift of Life');
                let randomInventoryIndex = Math.floor(Math.random() * saleItems.length);
                let selectedItem = saleItems[randomInventoryIndex];
                
                let beltItemId = 'belt-item-' + Date.now() + '-' + i;
                
                itemsBoughtThisTurn.push({ 
                    id: beltItemId,
                    emoji: selectedItem.emoji, 
                    name: selectedItem.name,
                    retailPrice: selectedItem.retailPrice, 
                    tip: selectedItem.tip,
                    category: selectedItem.category,
                    scanned: false,
                    binned: false
                });
                
                selectedItem.qty--;
                if (selectedItem.qty === 0) {
                    let inventoryIndex = inventory.indexOf(selectedItem);
                    if (inventoryIndex !== -1) inventory.splice(inventoryIndex, 1);
                }
            }

            renderShelves(); 
            renderBeltItems();
            
            let maxPatience = numItemsToBuy * 100;
            customerPatience = maxPatience;
            
            patienceInterval = setInterval(() => {
                customerPatience -= 1;
                let percentage = (customerPatience / maxPatience) * 100;
                document.getElementById('patience-bar').style.width = percentage + '%';
                
                if (currentCustomerType !== 'child' && currentCustomerType !== 'ceo') {
                    let mood = document.getElementById('customer-mood').innerText;
                    if(mood !== '😠' && mood !== '🤬') { 
                        if(percentage < 75) mood = '🙂';
                        if(percentage < 50) mood = '😐';
                        if(percentage < 25) mood = '😠';
                        document.getElementById('customer-mood').innerText = mood;
                    }
                }
                
                if(customerPatience <= 0) {
                    clearInterval(patienceInterval);
                    if (currentCustomerType !== 'child' && currentCustomerType !== 'ceo') {
                        document.getElementById('customer-mood').innerText = '🤬';
                    }
                }
            }, 100);
        }

        function renderBeltItems() {
            const belt = document.getElementById('belt');
            belt.innerHTML = '';
            itemsBoughtThisTurn.forEach(item => {
                if(!item.binned) {
                    let classes = "belt-item";
                    if(item.scanned) classes += " scanned";
                    belt.innerHTML += `<div id="${item.id}" class="${classes}" data-price="${item.retailPrice}" 
                        onclick="selectBeltItem('${item.id}')"
                        onmouseover="scanItem('${item.id}')">${item.emoji}</div>`;
                }
            });
            checkOrderComplete();
        }

        function toggleScanner() {
            if(document.getElementById('btn-scanner').classList.contains('faded')) return;
            isScanning = true;
            document.getElementById('btn-scanner').classList.add('faded');
            document.body.classList.add('scanning-mode');
            playTick();
        }

        function setupTouchScanner() {
            document.getElementById('belt').addEventListener('touchmove', function(e) {
                if (!isScanning) return;
                let touch = e.touches[0];
                let element = document.elementFromPoint(touch.clientX, touch.clientY);
                if (element && element.classList.contains('belt-item') && !element.classList.contains('scanned')) {
                    e.preventDefault();
                    scanItem(element.id);
                }
            }, { passive: false });
        }

        function selectBeltItem(id) {
            if(isScanning) return; 
            if(selectedBeltItem) document.getElementById(selectedBeltItem).classList.remove('selected-for-bin');
            
            let item = itemsBoughtThisTurn.find(i => i.id === id);
            if(item && !item.scanned) {
                selectedBeltItem = id;
                document.getElementById(id).classList.add('selected-for-bin');
                document.getElementById('btn-bin').style.display = 'block';
                playTick();
            }
        }

        function binSelectedItem() {
            if(!selectedBeltItem) return;
            let item = itemsBoughtThisTurn.find(i => i.id === selectedBeltItem);
            if(item) {
                item.binned = true;
                playThwack();
                selectedBeltItem = null;
                document.getElementById('btn-bin').style.display = 'none';
                renderBeltItems();
            }
        }

        function scanItem(id) {
            let element = document.getElementById(id);
            let item = itemsBoughtThisTurn.find(i => i.id === id);
            if (!isScanning || !item || item.scanned || item.binned) return;
            item.scanned = true;
            element.classList.add('scanned');
            currentOrderTotal += item.retailPrice;
            document.getElementById('screen-total').innerText = "$" + currentOrderTotal.toFixed(2);
            playBeep();
            if(currentCustomerType === 'child' && item.category === 'Eighteen') hasSoldRestrictedToChild = true;
            checkOrderComplete();
        }

        function checkOrderComplete() {
            let allDone = itemsBoughtThisTurn.filter(i=>!i.binned).every(i=>i.scanned);
            if(itemsBoughtThisTurn.length > 0 && allDone) {
                isScanning = false;
                document.body.classList.remove('scanning-mode');
                document.getElementById('btn-scanner').classList.add('faded');
                document.getElementById('btn-tick').classList.add('ready');
                document.getElementById('btn-bin').style.display = 'none';
            }
        }

        function finishOrder() { 
            turnCounter++; 
            if (currentOrderTotal === 0 && itemsBoughtThisTurn.length > 0) {
                clearInterval(patienceInterval);
                document.getElementById('btn-tick').classList.remove('ready');
                generateCustomerBelt(); return;
            }
            cash += currentOrderTotal;
            if(customerPatience > 0) {
                let mood = document.getElementById('customer-mood').innerText;
                if(mood !== '😠' && mood !== '🤬') {
                    let tip = itemsBoughtThisTurn.filter(i=>!i.binned).reduce((s,i)=>s+i.tip,0);
                    tipTotal += tip;
                    document.getElementById('tip-amount').innerText = "$" + tipTotal.toFixed(2); updateTipJarDisplay();
                    playTipSound();
                } else playCoinDrop();
            } else playCoinDrop(); 
            
            document.getElementById('cash').innerText = cash.toFixed(2);
            if(hasSoldRestrictedToChild) { policePending = true; policeTurnsLeft = 0; }
            clearInterval(patienceInterval);
            document.getElementById('btn-tick').classList.remove('ready');
            generateCustomerBelt(); 
        }

        // --- AUDIO ENGINE ---
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        const audioCtx = AudioContextClass ? new AudioContextClass() : null;
        
        function playTone(freq, type, duration, vol) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
            return osc;
        }

        function playBeep() { playTone(800, 'sine', 0.1, 0.1); }
        function playPop() {
            let osc = playTone(600, 'sine', 0.1, 0.1);
            if (!osc) return;
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
        }
        function playTick() { playTone(1200, 'square', 0.05, 0.02); }
        function playThwack() {
            let osc = playTone(200, 'triangle', 0.15, 0.1);
            if (!osc) return;
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
        }
        function playCoinDrop() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(2500, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
        function playTipSound() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playTone(1046.50, 'sine', 0.2, 0.1); 
            setTimeout(() => playTone(1318.51, 'sine', 0.4, 0.1), 100); 
        }
        function playDeliveryChime() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playTone(523.25, 'sine', 0.3, 0.1); 
            setTimeout(() => playTone(659.25, 'sine', 0.3, 0.1), 150); 
            setTimeout(() => playTone(783.99, 'sine', 0.5, 0.1), 300); 
        }

        init();
    </script>

    <div id="delivery-basket-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:16px;z-index:999;max-width:420px;width:90%;border:3px solid #ffdac1;box-shadow:0 10px 40px rgba(0,0,0,.2)"></div>
