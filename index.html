<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Super Shopper</title>
    <style>
        /* Pastel Minimalist Theme */
        * { box-sizing: border-box; }
        html { min-height: 100%; overflow-x: hidden; scroll-padding-top: 90px; -webkit-overflow-scrolling: touch; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #fdfaf6; color: #4a4a4a; user-select: none; min-height: 100dvh; overflow-x: hidden; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
        
        /* Navbar */
        #navbar { background: #b5ead7; color: #2c3e50; padding: calc(15px + env(safe-area-inset-top, 0px)) 30px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 15px rgba(0,0,0,0.05); width: 100%; max-width: 100vw; overflow: hidden; }
        #hamburger { font-size: 24px; cursor: pointer; background: none; border: none; color: #2c3e50; transition: 0.2s; }
        #hamburger:hover { transform: scale(1.1); }
        #nav-controls { display: flex; gap: 20px; align-items: center; }
        .nav-stat { font-size: 16px; font-weight: 700; background: rgba(255,255,255,0.6); padding: 8px 16px; border-radius: 12px; color: #2c3e50; }
        #cash-display { color: #2c3e50; }
        
        /* Cart Button & Modal */
        #btn-cart, .top-icon-btn { background: #ffdac1; color: #2c3e50; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 15px; transition: 0.2s; box-shadow: 0 4px 0 #e8c6af; }
        #btn-cart:hover, .top-icon-btn:hover { transform: translateY(2px); box-shadow: 0 2px 0 #e8c6af; }
        #btn-preorders { background: #c7ceea; box-shadow: 0 4px 0 #b5bcd6; }
        #cart-modal, .contract-modal { display: none; position: fixed; top: 75px; right: 30px; background: white; color: #4a4a4a; width: 360px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); z-index: 300; padding: 25px; border: 2px solid #ffdac1; max-height: 70vh; overflow-y: auto; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px dashed #fdfaf6; padding-bottom: 12px; font-size: 15px; }
        .cart-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn { background: #e2f0cb; border: none; border-radius: 6px; cursor: pointer; padding: 5px 12px; font-weight: bold; color: #2c3e50; }
        .del-btn { background: #ff9aa2; color: white; border: none; border-radius: 6px; cursor: pointer; padding: 5px 10px; font-weight: bold; }
        
        #btn-buy { width: 100%; background: #b5ead7; color: #2c3e50; border: none; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; border-radius: 12px; transition: 0.2s; box-shadow: 0 4px 0 #a2d5c4; }
        
        /* Timer & Gift */
        #timer-display { color: #2c3e50; }
        #btn-gift { display: none; background: #c7ceea; color: #2c3e50; border: none; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 0 #b5bcd6; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .contract-icon{display:inline-block;font-size:1.4em;}
        .contract-icon.attention{animation:pulse 1.5s infinite;}

        /* Side Menu */
        #side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #fffaf0; border-right: 3px solid #ffdac1; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; padding-top: 80px; }
        #side-menu.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
        .menu-btn { display: block; width: 100%; padding: 18px 30px; color: #4a4a4a; text-decoration: none; font-size: 17px; font-weight: 600; border: none; background: none; text-align: left; cursor: pointer; border-bottom: 2px dashed #fdfaf6; transition: 0.2s; }
        .menu-btn:hover { background: #ffe5d9; padding-left: 35px; color: #2c3e50; }
        #close-menu { position: absolute; top: 15px; right: 25px; font-size: 35px; color: #ff9aa2; cursor: pointer; transition: 0.2s; font-weight: 700; }
        .save-status { padding: 14px 30px; color: #7f8c8d; font-size: 13px; font-weight: 700; line-height: 1.35; }

        /* Game Screens */
        .screen { display: none; padding: 40px; max-width: 1000px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h1 { border-bottom: 3px dashed #ffdac1; padding-bottom: 15px; color: #2c3e50; font-weight: 800; font-size: 32px; margin-top: 0; }
        p { color: #7f8c8d; font-size: 16px; line-height: 1.5; font-weight: 500; }

        /* Customer & Register Screen */
        #customer-area { display: flex; align-items: center; justify-content: center; gap: 15px; background: white; padding: 10px 20px; border-radius: 16px; margin-bottom: 15px; border: 2px solid #fdfaf6; width: max-content; margin-left: auto; margin-right: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        #customer-person { font-size: 45px; }
        #customer-mood { font-size: 35px; }

        #patience-container { width: 100%; background: #fdfaf6; height: 12px; border-radius: 6px; margin-bottom: 15px; border: 2px solid #e2f0cb; overflow: hidden; }
        #patience-bar { width: 100%; background: #b5ead7; height: 100%; transition: width 0.1s linear, background-color 0.5s; }
        
        #belt { background: #e2f0cb; height: 160px; border-radius: 16px; display: flex; align-items: center; padding: 15px; gap: 20px; overflow-x: auto; margin-bottom: 25px; border: 3px solid #d4e2bd; touch-action: pan-y; position: relative; }
        .belt-item { font-size: 45px; background: white; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 3px solid transparent; }
        .belt-item.scanned { opacity: 0.3; pointer-events: none; transform: scale(0.9); }
        .belt-item.selected-for-bin { border-color: #ff9aa2; transform: scale(1.1); background: #fff0f1; }
        
        #register-controls { display: flex; gap: 15px; align-items: center; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 2px solid #fdfaf6; flex-wrap: wrap; }
        .icon-btn { font-size: 16px; font-weight: 700; padding: 15px 20px; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s; }
        
        #btn-start { background: #2ecc71; color: white; box-shadow: 0 4px 0 #27ae60; font-size: 20px; padding: 15px 40px; }
        #btn-start:hover { transform: translateY(2px); box-shadow: 0 2px 0 #27ae60; }
        #btn-start.stop-mode { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
        #btn-start.stop-mode:hover { box-shadow: 0 2px 0 #c0392b; }

        #btn-scanner { background: #aec4e6; color: #2c3e50; box-shadow: 0 4px 0 #9cb2d4; }
        #btn-scanner.active { background: #aec4e6; color: #2c3e50; box-shadow: 0 4px 0 #9cb2d4; }
        #btn-scanner.faded { opacity: 0.4; pointer-events: none; box-shadow: none; transform: translateY(4px); }
        
        #btn-bin { background: #ff9aa2; color: white; box-shadow: 0 4px 0 #e88c94; display: none; }
        #btn-bin:hover { transform: translateY(2px); box-shadow: 0 2px 0 #e88c94; }

        #btn-tick { background: #fdfaf6; color: #bdc3c7; pointer-events: none; }
        #btn-tick.ready { background: #b5ead7; color: #2c3e50; pointer-events: auto; box-shadow: 0 4px 0 #a2d5c4; transform: scale(1.05); }
        
        #screen-total { font-size: 28px; font-family: 'Courier New', Courier, monospace; background: white; color: #2c3e50; padding: 12px 25px; border-radius: 12px; font-weight: 800; border: 3px solid #b5ead7; }

        /* Event Buttons (Police / Robber) */
        .event-btn { font-size: 16px; font-weight: 700; padding: 15px 20px; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s; display: none; margin-right: 10px; }
        #btn-pay-fine { background: #ffdac1; color: #2c3e50; box-shadow: 0 4px 0 #e8c6af; }
        #btn-police-basket { background: #b5ead7; color: #2c3e50; box-shadow: 0 4px 0 #a2d5c4; }
        
        #btn-robber-tips { background: #c7ceea; color: #2c3e50; box-shadow: 0 4px 0 #b5bcd6; }
        #btn-robber-basket { background: #ffdac1; color: #2c3e50; box-shadow: 0 4px 0 #e8c6af; }
        
        #btn-ceo-accept { background: #2ecc71; color: white; box-shadow: 0 4px 0 #27ae60; }

        /* Tip Jar */
        #tip-jar { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:#fffaf0; padding:10px 20px; border-radius:12px; border:2px dashed #ffdac1; margin-left:auto; min-width:120px; }
        #tip-jar-label { font-size: 34px; line-height:1; margin-bottom:4px; font-weight: 800; color: #ff9aa2; text-transform: uppercase; letter-spacing: 1px; }
        #tip-amount { font-size: 22px; font-weight: 800; color: #2c3e50; margin: 5px 0; }
        #btn-collect-tips { background: #ffdac1; border: none; padding: 5px 15px; border-radius: 6px; font-weight: 700; color: #2c3e50; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 0 #e8c6af; font-size: 13px; }
        #btn-collect-tips:hover { transform: translateY(1px); box-shadow: 0 1px 0 #e8c6af; }
        #btn-collect-tips:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Custom Scanner Cursor */
        body.scanning-mode { cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🔫</text></svg>") 16 16, crosshair !important; }

        /* Styled Pastel Shelves */
        .shelf-container { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 14px 12px; padding: 14px 22px 30px; border-radius: 16px; min-height: 200px; background-size: auto; box-shadow: inset 0 8px 18px rgba(255,255,255,0.35), inset 0 -10px 20px rgba(0,0,0,0.05); }
        .wooden-shelf { background-color: #f6e2d3; background-image: linear-gradient(90deg, rgba(172, 116, 76, 0.28) 0 12px, transparent 12px calc(100% - 12px), rgba(172, 116, 76, 0.28) calc(100% - 12px)), repeating-linear-gradient(to bottom, transparent 0 96px, rgba(154, 95, 57, 0.42) 96px 106px, rgba(255,255,255,0.45) 106px 110px), repeating-linear-gradient(90deg, rgba(255,255,255,0.22) 0 18px, rgba(210, 153, 112, 0.20) 18px 38px); border: 5px solid #d7a884; border-bottom: 20px solid #b9825c; } 
        .metal-shelf { background-color: #eef2f7; background-image: linear-gradient(90deg, rgba(125, 137, 154, 0.32) 0 10px, transparent 10px calc(100% - 10px), rgba(125, 137, 154, 0.32) calc(100% - 10px)), repeating-linear-gradient(to bottom, transparent 0 96px, rgba(111, 126, 145, 0.48) 96px 106px, rgba(255,255,255,0.65) 106px 110px), repeating-linear-gradient(90deg, rgba(159, 174, 193, 0.32) 0 2px, transparent 2px 24px); border: 5px solid #b5bfcd; border-bottom: 20px solid #8f9caf; } 
        
        .product-card { position: relative; background: #fff; padding: 9px 7px 7px; border-radius: 10px; text-align: center; width: 80px; height: 82px; cursor: default; transition: 0.2s; border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .product-card:hover { border-color: #ffdac1; transform: translateY(-3px); }
        .product-card.selected { border: 3px solid #ff9aa2; background: #fff0f1; transform: scale(1.05); }
        .product-card-emoji { font-size: 25px; margin-bottom: 2px; }
        .product-price { font-weight: 700; color: #2c3e50; margin-top: 3px; font-size: 11px; background: #e2f0cb; border-radius: 6px; padding: 1px 2px; }
        .product-name { font-size: 10px; font-weight: 600; color: #7f8c8d; white-space: normal; overflow: hidden; line-height: 1.1; min-height: 2.2em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .sale-toggle { position: absolute; top: 5px; left: 5px; width: 23px; height: 23px; border: 2px solid #2ecc71; border-radius: 50%; background: white; color: transparent; font-size: 14px; font-weight: 900; line-height: 18px; cursor: pointer; transition: 0.15s; }
        .sale-toggle.available { background: #2ecc71; color: white; box-shadow: 0 2px 0 #27ae60; }
        .discount-burst { position:absolute; top:-8px; right:-8px; width:42px; height:42px; background:#ff5a66; color:white; font-size:9px; font-weight:900; display:flex; align-items:center; justify-content:center; text-align:center; line-height:1; z-index:20; clip-path:polygon(50% 0%,62% 20%,85% 8%,75% 35%,100% 50%,75% 65%,85% 92%,62% 80%,50% 100%,38% 80%,15% 92%,25% 65%,0% 50%,25% 35%,15% 8%,38% 20%); }

        /* Quantity Badge */
        .qty-badge { position: absolute; top: -8px; right: -8px; background: #ff9aa2; color: #2c3e50; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border: 3px solid #fff; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Manager Office */
        .catalog-grid { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 30px; }
        .catalog-category-title { width: 100%; border-bottom: 3px dashed #ffdac1; margin-top: 25px; padding-bottom: 8px; color: #2c3e50; font-size: 22px; font-weight: 700; }
        .catalog-item { position:relative; overflow:visible; background: #fff; padding: 20px 15px; border-radius: 16px; text-align: center; width: 110px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .catalog-item:hover { border-color: #aec4e6; transform: translateY(-4px); }
        .contract-modal { padding-top: 20px; }
        .contract-card { border: 2px solid #fdfaf6; border-radius: 12px; padding: 12px; margin-bottom: 12px; background: #fffaf0; }
        .contract-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; border-bottom: 3px dashed #ffdac1; padding-bottom: 12px; margin-bottom: 14px; }
        .contract-header h2 { margin: 0; border: 0; padding: 0; font-size: 22px; color: #2c3e50; }
        .contract-timer { background: #fdfaf6; border: 2px solid #ffdac1; border-radius: 10px; padding: 6px 9px; font-weight: 900; color: #2c3e50; white-space: nowrap; font-size: 13px; }
        .contract-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 8px; }
        .contract-tile { position: relative; min-height: 62px; border-radius: 10px; background: white; border: 2px solid #fdfaf6; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 7px 4px 5px; }
        .contract-emoji { font-size: 24px; line-height: 1; }
        .contract-name { margin-top: 4px; max-width: 100%; color: #7f8c8d; font-size: 10px; line-height: 1.05; text-align: center; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .contract-qty { position: absolute; top: -7px; right: -7px; min-width: 23px; height: 23px; border-radius: 999px; background: #ff5a66; border: 3px solid white; color: white; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; padding: 0 5px; z-index: 10; cursor: pointer; }
        .contract-tile.done .contract-qty { background: #2ecc71; }
        .contract-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; justify-content:center; }
        .delivery-reward { background:#2ecc71 !important; color:white !important; }
        .contract-action { border: none; border-radius: 8px; padding: 8px 12px; font-weight: 900; cursor: pointer; color: #2c3e50; background: #b5ead7; min-width: 70px; }
        .contract-action:disabled { opacity: 0.45; cursor: not-allowed; }

        /* Custom Modal Styles */
        #custom-alert-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.4); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .custom-alert-box { background: white; padding: 25px; border-radius: 16px; max-width: 320px; width: 90%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border: 3px solid #ffdac1; }
        .custom-alert-btn { background: #b5ead7; color: #2c3e50; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 15px; margin: 5px; min-width: 80px; }
        .custom-alert-btn.danger { background: #ff9aa2; color: white; }
        .custom-alert-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        body.scanning-mode #belt { touch-action: pan-y; }

        @media (max-width: 760px) {
            html { scroll-padding-top: 132px; }
            #navbar { display: grid; grid-template-columns: auto 1fr; gap: 10px 12px; align-items: center; padding: calc(10px + env(safe-area-inset-top, 0px)) 12px 10px; }
            #hamburger { font-size: 18px; min-height: 42px; white-space: nowrap; }
            #navbar > div:nth-child(2) { font-size: 19px !important; text-align: right; min-width: 0; }
            #nav-controls { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; width: 100%; min-width: 0; }
            #btn-gift { grid-column: 1 / -1; width: 100%; }
            #btn-cart { grid-column: 1 / -1; }
            .nav-stat, #btn-cart, #btn-gift, .top-icon-btn { min-width: 0; max-width: 100%; width: 100%; padding: 9px 8px; font-size: 14px; text-align: center; white-space: normal; overflow-wrap: anywhere; line-height: 1.15; }
            #cart-modal, .contract-modal { left: 12px; right: 12px; top: calc(118px + env(safe-area-inset-top, 0px)); width: auto; max-height: calc(100dvh - 145px); padding: 18px; }
            .cart-item { align-items: flex-start; gap: 10px; }
            .cart-controls { flex-shrink: 0; }
            #side-menu { width: min(82vw, 280px); left: min(-82vw, -280px); height: 100dvh; padding-top: calc(70px + env(safe-area-inset-top, 0px)); }
            .screen { padding: 20px 14px 34px; max-width: 100%; }
            h1 { font-size: 26px; padding-bottom: 12px; }
            p { font-size: 14px; }
            #customer-area { width: fit-content; max-width: 100%; padding: 8px 16px; }
            #customer-person { font-size: 38px; }
            #customer-mood { font-size: 30px; }
            #belt { min-height: 134px; height: auto; flex-wrap: wrap; justify-content: center; overflow: visible; gap: 12px; padding: 12px; }
            .belt-item { font-size: 38px; padding: 12px; }
            #register-controls { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; padding: 12px; align-items: stretch; }
            .icon-btn, .event-btn { width: 100%; min-height: 48px; padding: 12px 10px; font-size: 14px; margin-right: 0; white-space: normal; }
            #btn-start, #screen-total, #btn-tick, #tip-jar { grid-column: span 2; }
            #btn-start { font-size: 18px; padding: 13px 16px; }
            #screen-total { text-align: center; font-size: 24px; padding: 10px 14px; }
            #tip-jar { margin-left: 0; min-width: 0; padding: 10px; }
            .shelf-container, .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap: 12px; padding: 16px; width: 100%; }
            .shelf-container { grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); }
            .catalog-grid { padding: 0; }
            .catalog-category-title { grid-column: 1 / -1; font-size: 19px; margin-top: 20px; }
            .catalog-item { width: 100%; min-width: 0; padding: 14px 8px; }
            .product-card { width: 100%; min-width: 0; min-height: 94px; }
            .product-card-emoji { font-size: 30px; }
            .product-name { white-space: normal; line-height: 1.2; min-height: 2.4em; }
        }

        @media (max-width: 390px) {
            #register-controls { grid-template-columns: 1fr; }
            #btn-start, #screen-total, #btn-tick, #tip-jar { grid-column: auto; }
            .catalog-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .shelf-container { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
    </style>
</head>
<body>

    <div id="custom-alert-modal">
        <div class="custom-alert-box">
            <div id="custom-alert-text" style="color:#2c3e50;font-size:16px;font-weight:600;margin-bottom:20px;white-space:pre-wrap;"></div>
            <div id="custom-alert-buttons" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"></div>
        </div>
    </div>

    <div id="navbar">
        <button id="hamburger" onclick="toggleMenu()">☰ Menu</button>
        <div style="font-size: 28px; font-weight: 900; letter-spacing: 1px; color: #2c3e50; font-family: 'Trebuchet MS', 'Comic Sans MS', cursive; text-shadow: 2px 2px 0 #ffdac1; margin-left:12px;">🛒 Super Shopper</div>
        <div id="nav-controls">
            <button id="btn-gift" onclick="collectDelivery()">📦 Receive Stock</button>
            <button id="btn-preorders" class="top-icon-btn" onclick="toggleContractModal('preorder-modal')">🚚</button>
            <div class="nav-stat" id="timer-display">00:00</div>
            <div class="nav-stat" id="cash-display">$<span id="cash">100.00</span></div>
            <button id="btn-cart" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
        </div>
    </div>

    <div id="cart-modal">
        <h2 style="margin-top:0; border-bottom: 3px dashed #ffdac1; padding-bottom: 15px; font-size: 22px; color: #2c3e50;">Your Order</h2>
        <div id="cart-items"></div>
        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:18px; color: #2c3e50; margin-top: 20px;">
            <span>Total:</span>
            <span id="cart-total">$0.00</span>
        </div>
        <button id="btn-buy" onclick="buyCart()">Place Order</button>
    </div>

    <div id="preorder-modal" class="contract-modal">
        <div id="preorder-content"></div>
    </div>

    <div id="side-menu">
        <span id="close-menu" onclick="toggleMenu()">×</span>

        function isDeliveryDiscountItem(productName) {
            if (deliveryData.state === 'PACKING') return false;
            return deliveryData.gifts.some(item => item.name === productName);
        }

        function getSupplierCost(product) {
            let cost = product.retailPrice;
            return isDeliveryDiscountItem(product.name) ? +(cost * 0.8).toFixed(2) : cost;
        }

        function updateTipJarDisplay() {
            const icon = document.getElementById('tip-jar-label');
            const btn = document.getElementById('btn-collect-tips');
            const amount = document.getElementById('tip-amount');
            if (!btn) return;
            if (icon) icon.textContent = tipTotal > 0 ? '💰' : '🪙';
            const valueText = '$' + Number(tipTotal || 0).toFixed(2);
            btn.textContent = valueText;
            if (amount) amount.innerText = valueText;
        }

        // --- SAVE SYSTEM ---
        function saveProgress() {
            if (isShiftStarted) {
                returnBeltItemsToInventory();
                stopShift();
            }

            const saveData = {
                version: 6,
                savedAt: Date.now(),
                cash,
                tipTotal,
                inventory,
                cart,
                deliveryBox,
                deliveryTimer,
                policePending,
                policeTurnsLeft,
                deliveryData,
                robberReformed,
                robberReturnTurn,
                robberGiftType,
                turnCounter
            };
            
            localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
            updateSaveStatus('Progress saved.');
            playTick();
            
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
        }

        function loadProgress(showMessage = true) {
            const rawSave = localStorage.getItem(SAVE_KEY);
            if (!rawSave) {
                if (showMessage) updateSaveStatus('No save found.');
                return false;
            }

            try {
                const saveData = JSON.parse(rawSave);
                cash = Number(saveData.cash ?? 100);
                tipTotal = Number(saveData.tipTotal ?? 0);
                inventory = Array.isArray(saveData.inventory) ? saveData.inventory : [];
                cart = Array.isArray(saveData.cart) ? saveData.cart : [];
                deliveryBox = Array.isArray(saveData.deliveryBox) ? saveData.deliveryBox : [];
                deliveryTimer = Number(saveData.deliveryTimer ?? 0);
                policePending = Boolean(saveData.policePending);
                policeTurnsLeft = Number(saveData.policeTurnsLeft ?? 0);
                
                deliveryData = saveData.deliveryData || { state: 'PACKING', gifts: [], nextDeliveryAt: 0, boxes: [null, null, null, null, null] };
                if (!deliveryData.boxes || deliveryData.boxes.length !== 5) {
                    deliveryData.boxes = [null, null, null, null, null];
                }
                
                robberReformed = Boolean(saveData.robberReformed);
                robberReturnTurn = Number(saveData.robberReturnTurn ?? -1);
                robberGiftType = saveData.robberGiftType || null;
                turnCounter = Number(saveData.turnCounter ?? 0);

                // Adapt old versions
                inventory = inventory.map(item => {
                    if(item.retailPrice === undefined) {
                        item.retailPrice = item.price;
                        item.tip = item.cost;
                        delete item.price;
                        delete item.cost;
                    }
                    if (item.forSale === undefined) item.forSale = true;
                    return item;
                });
                
                cart = cart.map(item => {
                    if(item.retailPrice === undefined) {
                        item.retailPrice = item.price;
                        item.tip = item.cost;
                        delete item.price; delete item.cost;
                    }
                    return item;
                });

                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('cash').innerText = cash.toFixed(2);
                document.getElementById('tip-amount').innerText = "$" + tipTotal.toFixed(2); updateTipJarDisplay();
                updateCartCount();
                renderCartModal();
                renderShelves();
                switchScreen('screen-register');
                stopShift();

                if (deliveryTimer > 0) {
                    startDeliveryTimer(deliveryTimer);
                } else if (deliveryBox.length > 0) {
                    document.getElementById('btn-gift').style.display = 'inline-block';
                } else {
                    document.getElementById('timer-display').innerText = '00:00';
                    document.getElementById('btn-gift').style.display = 'none';
                }

                updateSaveStatus(showMessage ? 'Save loaded.' : getSaveSummary(saveData.savedAt));
                renderContracts();
                if (showMessage) playPop();
                return true;
            } catch (error) {
                updateSaveStatus('Save could not be loaded.');
                return false;
            }
        }

        function clearSavedProgress() {
            if (!localStorage.getItem(SAVE_KEY)) {
                customAlert('No save to clear.');
                return;
            }

            customConfirm('Clear your saved progress from this browser?', (yes) => {
                if (yes) {
                    localStorage.removeItem(SAVE_KEY);
                    updateSaveStatus('Saved progress cleared.');
                    playThwack();
                }
            });
        }

        function updateSaveStatus(message) {
            const status = document.getElementById('save-status');
            if (status) status.innerText = message;
        }

        function getSaveSummary(savedAt) {
            if (!savedAt) return 'Save available.';
            return 'Last save: ' + new Date(savedAt).toLocaleString();
        }

        function returnBeltItemsToInventory() {
            itemsBoughtThisTurn.forEach(item => {
                if (item.binned) return;
                let existing = inventory.find(invItem => invItem.name === item.name);
                if (existing) existing.qty++;
                else inventory.push({
                    emoji: item.emoji,
                    name: item.name,
                    retailPrice: item.retailPrice,
                    tip: item.tip,
                    category: item.category,
                    qty: 1,
                    forSale: true
                });
            });

            itemsBoughtThisTurn = [];
            currentOrderTotal = 0;
            clearInterval(patienceInterval);
            renderShelves();
            renderCatalog();
        }

        // --- DELIVERY (PREORDER) SYSTEM ---
        function tickContracts() {
            const now = Date.now();

            if (deliveryData.state === 'WAITING' && now >= deliveryData.nextDeliveryAt) {
                deliveryData.state = 'UNPACKING';
                playDeliveryChime();
                renderContracts();
                renderCatalog();
            } else {
                renderContracts();
            }
        }

        function toggleContractModal(id) {
            ['cart-modal', 'preorder-modal'].forEach(modalId => {
                const modal = document.getElementById(modalId);
                if (modalId !== id) modal.style.display = 'none';
            });
            const modal = document.getElementById(id);
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            renderContracts();
            playTick();
        }

        function renderContracts() {
            renderPreOrder();
            document.getElementById('btn-preorders').innerHTML =
                `<span class="contract-icon ${deliveryData.state === 'UNPACKING' ? 'attention' : ''}">🚚</span>`;
        }

        function renderPreOrder() {
            const content = document.getElementById('preorder-content');
            if (!content) return;

            let headerHtml = `<div class="contract-header"><h2>Daily Delivery</h2><div class="contract-timer">`;
            let totalValue = 0;
            if (deliveryData.boxes) {
                totalValue = deliveryData.boxes.reduce((s, b) => s + (b ? b.retailPrice * b.qty : 0), 0);
            }

            if (deliveryData.state === 'PACKING') {
                headerHtml += `Total Value: $${totalValue.toFixed(2)}</div></div>`;
            } else if (deliveryData.state === 'WAITING') {
                headerHtml += `${formatDuration(Math.max(0, deliveryData.nextDeliveryAt - Date.now()))}</div></div>`;
            } else {
                headerHtml += `Arrived</div></div>`;
            }

            let itemsHtml = '';
            
            if (deliveryData.state === 'PACKING') {
                for(let i=0; i<5; i++) {
                    let box = deliveryData.boxes[i];
                    if (box) {
                        itemsHtml += `<div class="contract-tile" onclick="openDeliveryBasket(${i})" style="cursor:pointer; position:relative;">
                            <div class="contract-qty" onclick="decrementBoxItem(event, ${i})">${box.qty}</div>
                            <div class="contract-emoji">${box.emoji}</div>
                            <div class="contract-name">${box.name}</div>
                        </div>`;
                    } else {
                        itemsHtml += `<div class="contract-tile" onclick="openDeliveryBasket(${i})" style="cursor:pointer;">
                            <div class="contract-emoji" style="color:#b5ead7; font-size:32px; font-weight:bold;">+</div>
                        </div>`;
                    }
                }
            } else if (deliveryData.state === 'WAITING') {
                for(let i=0; i<5; i++) {
                    itemsHtml += `<div class="contract-tile">
                        <div class="contract-emoji" style="opacity:0.3;">🚚</div>
                    </div>`;
                }
            } else if (deliveryData.state === 'UNPACKING') {
                deliveryData.gifts.forEach((g, i) => {
                    if (g.collected) {
                        itemsHtml += `<div class="contract-tile">
                            <div class="contract-emoji" style="color:#b5ead7; font-size:32px; font-weight:bold;">+</div>
                        </div>`;
                    } else if (!g.revealed) {
                        itemsHtml += `<div class="contract-tile" onclick="revealGift(${i})" style="cursor:pointer;">
                            <div class="contract-emoji" style="font-size:26px;">🎁</div>
                        </div>`;
                    } else {
                        itemsHtml += `<div class="contract-tile" onclick="collectGift(${i})" style="cursor:pointer;">
                            <div class="contract-emoji">${g.emoji}</div>
                        </div>`;
                    }
                });
            }

            let actionHtml = '';
            if (deliveryData.state === 'PACKING') {
                let allFilled = deliveryData.boxes && deliveryData.boxes.every(b => b && b.qty > 0);
                actionHtml = `<div class="contract-actions"><button class="contract-action delivery-reward" onclick="packDelivery()" ${allFilled ? '' : 'disabled'}>Pack Delivery</button></div>`;
            }

            content.innerHTML = `${headerHtml}<div class="contract-card"><div class="contract-items">${itemsHtml}</div>${actionHtml}</div>`;
        }

        function decrementBoxItem(event, boxIndex) {
            event.stopPropagation();
            let box = deliveryData.boxes[boxIndex];
            if (!box || box.qty <= 0) return;
            
            box.qty--;
            addInventoryByName(box.name, 1);
            
            if (box.qty <= 0) {
                deliveryData.boxes[boxIndex] = null;
            }
            playThwack();
            renderPreOrder();
            renderShelves();
        }

        function openDeliveryBasket(boxIndex) {
            window.currentDeliveryBox = boxIndex;
            let currentBox = deliveryData.boxes[boxIndex];
            let preselectedItemName = null;
            let preselectedQty = 0;
            
            if (currentBox) {
                preselectedItemName = currentBox.name;
                preselectedQty = currentBox.qty;
                // Temporarily return to inventory for modal calculations
                addInventoryByName(currentBox.name, currentBox.qty);
                window.deliveryOriginalBox = { ...currentBox };
                deliveryData.boxes[boxIndex] = null;
            } else {
                window.deliveryOriginalBox = null;
            }

            const eligible = inventory.filter(i => i.qty > 0 && i.category !== 'Gift of Life');
            window.deliveryEligible = eligible;
            window.deliveryBasketSelection = {};
            
            if (preselectedItemName) {
                let idx = eligible.findIndex(i => i.name === preselectedItemName);
                if (idx !== -1) {
                    window.deliveryBasketSelection[idx] = preselectedQty;
                }
            }

            const modal = document.getElementById('delivery-basket-modal');
            let html = `<h3>Pack Delivery Box ${boxIndex + 1}</h3>
            <style>
            .rb-grid{display:flex;gap:10px;margin:10px 0;overflow-x:auto;flex-wrap:nowrap;padding-bottom:8px;}
            .rb-item{position:relative;width:90px;border:2px solid #ddd;border-radius:12px;padding:8px;text-align:center;cursor:pointer;background:#fff;}
            .rb-item.selected{border:3px solid #b5ead7;background:#f1fff9;}
            .rb-badge{position:absolute;top:-8px;right:-8px;background:#2ecc71;color:#fff;border-radius:999px;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;}
            .rb-emoji{font-size:26px;}
            .rb-name{font-size:10px;min-height:24px;}
            .rb-qty{font-size:11px;font-weight:700;}
            </style><div class="rb-grid">`;

            if(!eligible.length){html+='<p>No suitable items in inventory.</p>';}
            eligible.forEach((i,n)=>{
                let qty = window.deliveryBasketSelection[n] || 0;
                html+=`<div class="rb-item ${qty>0?'selected':''}" id="db-item-${n}" onclick="incrementDeliveryItem(${n})">
                <div class="rb-badge" onclick="event.stopPropagation();decrementDeliveryItem(${n})" id="db-badge-${n}">${qty}</div>
                <div class="rb-emoji">${i.emoji}</div>
                <div class="rb-name">${i.name}</div>
                <div class="rb-qty" id="db-qty-${n}">(${qty}/${i.qty})</div>
                </div>`;
            });
            html+=`</div><br><button class="custom-alert-btn" onclick="submitDeliveryBasket()">OK</button> <button class="custom-alert-btn danger" onclick="cancelDeliveryBasket()">Cancel</button>`;
            modal.innerHTML = html;
            modal.style.display = 'block';
        }

        function incrementDeliveryItem(idx){
            const item = window.deliveryEligible[idx];
            
            // Enforce single item type per box
            let existingSelectionIdx = Object.keys(window.deliveryBasketSelection).find(k => window.deliveryBasketSelection[k] > 0);
            if (existingSelectionIdx && existingSelectionIdx !== String(idx)) {
                window.deliveryBasketSelection[existingSelectionIdx] = 0;
                updateDeliveryTile(existingSelectionIdx);
            }
            
            const current = window.deliveryBasketSelection[idx] || 0;
            if (current >= 100) {
                customAlert("Max 100 per box.");
                return;
            }
            window.deliveryBasketSelection[idx] = Math.min(current+1, item.qty);
            updateDeliveryTile(idx);
        }

        function decrementDeliveryItem(idx){
            const current = window.deliveryBasketSelection[idx] || 0;
            window.deliveryBasketSelection[idx] = Math.max(0, current-1);
            updateDeliveryTile(idx);
        }

        function updateDeliveryTile(idx){
            const item = window.deliveryEligible[idx];
            const qty = window.deliveryBasketSelection[idx] || 0;
            document.getElementById('db-badge-'+idx).textContent = qty;
            document.getElementById('db-qty-'+idx).textContent = `(${qty}/${item.qty})`;
            document.getElementById('db-item-'+idx).classList.toggle('selected', qty > 0);
        }
        
        function cancelDeliveryBasket() {
            if (window.deliveryOriginalBox) {
                removeInventoryQty(window.deliveryOriginalBox.name, window.deliveryOriginalBox.qty);
                deliveryData.boxes[window.currentDeliveryBox] = window.deliveryOriginalBox;
            }
            window.deliveryBasketSelection = {};
            window.deliveryOriginalBox = null;
            document.getElementById('delivery-basket-modal').style.display = 'none';
            renderPreOrder();
            renderShelves();
        }

        function submitDeliveryBasket() {
            let selectedCount = 0;
            let pickedItem = null;
            let pickedQty = 0;
            
            Object.entries(window.deliveryBasketSelection || {}).forEach(([idx,qty]) => {
                if(qty > 0) {
                    pickedItem = window.deliveryEligible[idx];
                    pickedQty = qty;
                    selectedCount += qty;
                }
            });

            if(selectedCount === 0) {
                deliveryData.boxes[window.currentDeliveryBox] = null;
            } else {
                removeInventoryQty(pickedItem.name, pickedQty);
                deliveryData.boxes[window.currentDeliveryBox] = {
                    name: pickedItem.name,
                    emoji: pickedItem.emoji,
                    qty: pickedQty,
                    retailPrice: pickedItem.retailPrice
                };
            }

            window.deliveryBasketSelection = {};
            window.deliveryOriginalBox = null;
            document.getElementById('delivery-basket-modal').style.display = 'none';
            renderPreOrder();
            renderShelves();
        }

        function packDelivery() {
            if(deliveryData.state !== 'PACKING') return;
            
            if(!deliveryData.boxes.every(box => box && box.qty > 0)) {
                return customAlert("Fill all 5 boxes to pack the delivery.");
            }

            let totalValue = deliveryData.boxes.reduce((s, b) => s + (b.retailPrice * b.qty), 0);

            // Determine tiers
            let tierPool;
            if(totalValue >= 127.51) {
                tierPool = productDB.filter(p => p.retailPrice >= 127.51);
            } else {
                tierPool = productDB.filter(p => p.retailPrice <= 127.50 && p.category !== 'Gift of Life'); 
            }
            if (tierPool.length === 0) tierPool = productDB;

            deliveryData.gifts = [];
            for(let i=0; i<5; i++) {
                let randomItem = tierPool[Math.floor(Math.random() * tierPool.length)];
                deliveryData.gifts.push({
                    name: randomItem.name,
                    emoji: randomItem.emoji,
                    revealed: false,
                    collected: false
                });
            }

            deliveryData.state = 'WAITING';
            deliveryData.nextDeliveryAt = Date.now() + HOUR_MS;
            deliveryData.boxes = [null, null, null, null, null];
            
            updateSaveStatus('Delivery packed and dispatched.');
            playTick();
            renderContracts();
            renderShelves();
            renderCatalog();
        }

        function revealGift(i) {
            if(deliveryData.gifts[i].collected) return;
            deliveryData.gifts[i].revealed = true;
            playPop();
            renderPreOrder();
        }

        function collectGift(i) {
            if(!deliveryData.gifts[i].revealed || deliveryData.gifts[i].collected) return;
            deliveryData.gifts[i].collected = true;
            addInventoryByName(deliveryData.gifts[i].name, 1);
            playCoinDrop();
            
            if (deliveryData.gifts.every(g => g.collected)) {
                deliveryData.state = 'PACKING';
                deliveryData.gifts = [];
                window.deliveryBasketSelection = {};
            }
            
            renderPreOrder();
            renderShelves();
            renderCatalog();
        }

        function addInventoryByName(name, qty) {
            const product = productDB.find(item => item.name === name);
            if (!product) return;
            let existing = inventory.find(item => item.name === name);
            if (existing) existing.qty += qty;
            else inventory.push({ ...product, qty, forSale: true });
        }

        function removeInventoryQty(name, qty) {
            let idx = inventory.findIndex(i => i.name === name);
            if (idx !== -1) {
                inventory[idx].qty -= qty;
                if (inventory[idx].qty <= 0) inventory.splice(idx, 1);
            }
        }

        function formatDuration(ms) {
            const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }

        // --- SHIFT CONTROLS ---
        function toggleShift() {
            if (isShiftStarted) {
                if (currentCustomerType === 'robber') {
                    customAlert("The robber snatched your tip jar while you were closing the register!");
                    tipTotal = 0;
                    document.getElementById('tip-amount').innerText = "$0.00";
                    updateTipJarDisplay();
                } else if (currentCustomerType === 'police') {
                    customAlert("You can't close the register on the police! They'll be back immediately.");
                    policeTurnsLeft = 0; 
                }
                stopShift();
            } else {
                startShift();
            }
        }

        function startShift() {
            isShiftStarted = true;
            let btnStart = document.getElementById('btn-start');
            btnStart.innerText = '⏹️ Stop';
            btnStart.classList.add('stop-mode');
            
            document.getElementById('btn-scanner').style.display = 'block';
            document.getElementById('screen-total').style.display = 'block';
            document.getElementById('btn-tick').style.display = 'block';
            
            playTick();
            generateCustomerBelt();
        }

        function stopShift() {
            isShiftStarted = false;
            clearInterval(patienceInterval);
            setTipCollectionLocked(false);
            
            let btnStart = document.getElementById('btn-start');
            btnStart.innerText = '▶️ Start';
            btnStart.classList.remove('stop-mode');
            
            document.getElementById('belt').innerHTML = '<div style="width:100%; text-align:center; color:#7f8c8d; font-size:18px; font-weight:700;">Press Start to begin serving customers.</div>';
            
            document.getElementById('btn-scanner').style.display = 'none';
            document.getElementById('btn-bin').style.display = 'none';
            document.getElementById('screen-total').style.display = 'none';
            document.getElementById('btn-tick').style.display = 'none';
            document.querySelectorAll('.event-btn').forEach(btn => btn.style.display = 'none');
            
            document.getElementById('customer-person').innerText = '🧑🏻';
            document.getElementById('customer-mood').innerText = '😴';
            document.getElementById('patience-bar').style.width = '100%';
            document.getElementById('patience-bar').style.backgroundColor = '#b5ead7';
            
            isScanning = false;
            document.body.classList.remove('scanning-mode');
            document.getElementById('btn-scanner').classList.remove('active', 'faded');
        }

        // --- NAVIGATION ---
        function toggleMenu() { 
            document.getElementById('side-menu').classList.toggle('open'); 
            playTick();
        }
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            renderShelves();
            playTick();
            
            if(isShiftStarted && screenId !== 'screen-register') {
                stopShift();
            }
            
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
        }

        // --- CART & ORDERING LOGIC ---
        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            const categorySelect = document.getElementById('catalog-category-filter');
            const search = (document.getElementById('catalog-search')?.value || '').toLowerCase();
            const sortMode = document.getElementById('catalog-sort-filter')?.value || 'default';

            const categories = [...new Set(productDB.map(p => p.category))];

            if (categorySelect && categorySelect.options.length === 1) {
                categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.textContent = cat;
                    categorySelect.appendChild(opt);
                });
            }

            const selectedCategory = categorySelect?.value || 'All';
            let html = '';

            let filtered = productDB
                .map((p, i) => ({...p, originalIndex:i}))
                .filter(p =>
                    (selectedCategory === 'All' || p.category === selectedCategory) &&
                    p.name.toLowerCase().includes(search)
                );

            if (sortMode === 'low-high') filtered.sort((a,b)=>a.retailPrice-b.retailPrice);
            if (sortMode === 'high-low') filtered.sort((a,b)=>b.retailPrice-a.retailPrice);

            if (selectedCategory === 'All') {
                categories.forEach(cat => {
                    const catItems = filtered.filter(p=>p.category===cat);
                    if (!catItems.length) return;

                    let color = cat === 'Eighteen' ? '#ff9aa2' : (cat === 'Gift of Life' ? '#ffd700' : '#ffdac1');
                    html += `<h2 class="catalog-category-title" style="border-color:${color}">${cat}</h2>`;

                    catItems.forEach(p => {
                        html += `
                        <div class="catalog-item" onclick="addToCart(${p.originalIndex})">
                            <div class="product-card-emoji">${p.emoji}</div>
                            <div class="product-name">${p.name}</div>
                            ${isDeliveryDiscountItem(p.name)?`<div class="discount-burst">20%<br>OFF</div><small style="display:block;text-decoration:line-through;color:#999;">$${p.retailPrice.toFixed(2)}</small>`:''}
                            <small style="color:#ff9aa2;font-weight:700;">$${getSupplierCost(p).toFixed(2)}</small>
                        </div>`;
                    });
                });
            } else {
                filtered.forEach(p => {
                    html += `
                    <div class="catalog-item" onclick="addToCart(${p.originalIndex})">
                        <div class="product-card-emoji">${p.emoji}</div>
                        <div class="product-name">${p.name}</div>
                        ${isDeliveryDiscountItem(p.name)?`<div class="discount-burst">20%<br>OFF</div><small style="display:block;text-decoration:line-through;color:#999;">$${p.retailPrice.toFixed(2)}</small>`:''}
                        <small style="color:#ff9aa2;font-weight:700;">$${getSupplierCost(p).toFixed(2)}</small>
                    </div>`;
                });
            }

            grid.innerHTML = html;
        }

        function addToCart(index) {
            let item = productDB[index];
            if(item.category === 'Gift of Life') return;
            let existing = cart.find(c => c.name === item.name);
            if(existing) existing.qty++;
            else cart.push({ ...item, qty: 1 });
            playPop(); 
            updateCartCount();
            renderCartModal();
        }

        function updateCartQty(index, delta) {
            cart[index].qty += delta;
            if(cart[index].qty <= 0) cart.splice(index, 1);
            playTick();
            updateCartCount();
            renderCartModal();
        }

        function removeCartItem(index) {
            cart.splice(index, 1);
            playTick();
            updateCartCount();
            renderCartModal();
        }

        function updateCartCount() {
            let totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = totalItems;
        }

        function toggleCart() {
            document.getElementById('preorder-modal').style.display = 'none';
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            playTick();
        }

        function renderCartModal() {
            const itemsDiv = document.getElementById('cart-items');
            let total = 0;
            itemsDiv.innerHTML = cart.map((item, i) => {
                let lineCost = getSupplierCost(item) * item.qty;
                total += lineCost;
                return `
                <div class="cart-item">
                    <span style="font-weight: 600;">${item.emoji} ${item.name} <span style="color:#7f8c8d">($${lineCost.toFixed(2)})</span></span>
                    <div class="cart-controls">
                        <button class="qty-btn" onclick="updateCartQty(${i}, -1)">-</button>
                        <span style="font-weight:700; width: 20px; text-align:center;">${item.qty}</span>
                        <button class="qty-btn" onclick="updateCartQty(${i}, 1)">+</button>
                        <button class="del-btn" onclick="removeCartItem(${i})">×</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = "$" + total.toFixed(2);
        }

        function buyCart() {
            let totalCost = cart.reduce((sum, item) => sum + (getSupplierCost(item) * item.qty), 0);
            if (cart.length === 0) return customAlert("Cart is empty!");
            if (cash >= totalCost) {
                if(deliveryTimer > 0) return customAlert("A delivery is already on the way!");
                cash -= totalCost;
                document.getElementById('cash').innerText = cash.toFixed(2);
                cart.forEach(item => {
                    for(let i=0; i<item.qty; i++) {
                        deliveryBox.push({ emoji: item.emoji, name: item.name, retailPrice: item.retailPrice, tip: item.tip, category: item.category });
                    }
                });
                cart = [];
                updateCartCount();
                renderCartModal();
                toggleCart();
                playCoinDrop();
                startDeliveryTimer(10); 
            } else {
                customAlert("Not enough cash!");
            }
        }

        // --- TIMER LOGIC ---
        function startDeliveryTimer(seconds) {
            deliveryTimer = seconds;
            document.getElementById('btn-gift').style.display = 'none';
            timerInterval = setInterval(() => {
                deliveryTimer--;
                let mins = Math.floor(deliveryTimer / 60).toString().padStart(2, '0');
                let secs = (deliveryTimer % 60).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${mins}:${secs}`;
                if (deliveryTimer <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer-display').innerText = `00:00`;
                    document.getElementById('btn-gift').style.display = 'inline-block';
                    playDeliveryChime(); 
                }
            }, 1000);
        }

        function collectDelivery() {
            deliveryBox.forEach(item => {
                let existing = inventory.find(i => i.name === item.name);
                if (existing) existing.qty++;
                else inventory.push({ ...item, qty: 1, forSale: true });
            });
            deliveryBox = [];
            document.getElementById('btn-gift').style.display = 'none';
            playPop();
            renderShelves();
            if(isShiftStarted && document.getElementById('belt').innerHTML.includes('No items')) {
                generateCustomerBelt();
            }
        }

        // --- INVENTORY SALE TOGGLE ---
        function renderShelves() {
            const generateCardHTML = (item, i) => {
                let isGift = item.category === 'Gift of Life';
                let isRestricted = item.category === 'Eighteen';
                let borderStyle = isRestricted ? 'border-color: #ff9aa2;' : (isGift ? 'border-color: #ffd700;' : '');
                let isForSale = isGift ? false : (item.forSale !== false);
                
                let saleToggleBtn = isGift ? '' : `<button class="sale-toggle ${isForSale ? 'available' : ''}" title="${isForSale ? 'Available for sale' : 'Inventory only'}" onclick="toggleForSale(${i})">✓</button>`;
                
                return `
                <div class="product-card" style="${borderStyle}">
                    ${saleToggleBtn}
                    <div class="qty-badge">${item.qty}</div>
                    <div class="product-card-emoji">${item.emoji}</div>
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">$${item.retailPrice.toFixed(2)}</div>
                </div>
                `;
            };
            
            document.getElementById('inventory-grid').innerHTML = inventory.map((item, i) => generateCardHTML(item, i)).join('');
        }

        function toggleForSale(index) {
            if(inventory[index].category === 'Gift of Life') return;
            inventory[index].forSale = inventory[index].forSale === false;
            playTick();
            renderShelves();
            
            if(isShiftStarted && document.getElementById('belt').innerHTML.includes('No items')) {
                generateCustomerBelt();
            }
        }

        // --- TIP COLLECTION ---
        function collectTips() {
            if (currentCustomerType === 'robber') return;
            if (tipTotal <= 0) return;
            cash += tipTotal;
            tipTotal = 0;
            document.getElementById('cash').innerText = cash.toFixed(2);
            document.getElementById('tip-amount').innerText = "$0.00";
            playCoinDrop();
            updateTipJarDisplay();
        }

        function setTipCollectionLocked(isLocked) {
            const button = document.getElementById('btn-collect-tips');
            button.disabled = isLocked;
            updateTipJarDisplay();
        }

            if (action === 'pay') {
                cash -= 50;
                document.getElementById('cash').innerText = cash.toFixed(2);
                policePending = false;
                playCoinDrop();
                generateCustomerBelt();
            }
        }

        function declinePoliceBasket() {
            document.getElementById('robber-basket-modal').style.display='none';
            cash -= 50;
            document.getElementById('cash').innerText = cash.toFixed(2);
            addInventoryByName('Lemon', 5);
            addInventoryByName('Milk', 5);
            policePending = false;
            customAlert("The policeman accepted your fine and left you essentials. Do better next time, make paneer.");
            generateCustomerBelt();
        }

        function submitPoliceBasket() {
            const picks = [];
            Object.entries(window.policeBasketSelection||{}).forEach(([idx,qty])=>{
                if(qty>0) picks.push({item:window.policeEligible[idx],qty});
            });

            let champagne = picks.find(p=>p.item.name==='Champagne');
            let donuts = picks.find(p=>p.item.name==='Donut');

            if (champagne && champagne.qty > 0) {
                let inv = inventory.find(x=>x.name==='Champagne');
                inv.qty -= 1;
                if (Math.random() < 0.5) {
                    policePending = false; playPop();
                    customAlert("Oh well, paperwork is annoying anyway.");
                } else {
                    cash -= 1000;
                    document.getElementById('cash').innerText = cash.toFixed(2);
                    policePending = false;
                    customAlert("The officer was offended.\n\nFine: $1000");
                }
            } else if (donuts && donuts.qty >= 10) {
                let inv = inventory.find(x=>x.name==='Donut');
                inv.qty -= 10;

                customAlert("The officer accepted your donuts and left.");
            } else {
                customAlert("You need to give 1 Champagne or 10 Donuts.");

            }

            renderShelves();
            document.getElementById('robber-basket-modal').style.display='none';
            generateCustomerBelt();

        function handleRobber(action) {
            setTipCollectionLocked(false);
            if (action === 'tips') {
                tipTotal = 0;
                document.getElementById('tip-amount').innerText = "$0.00";
                playThwack();
                generateCustomerBelt();
            } else if (action === 'basket') {
                openRobberBasket();
                return;
            } else if (action === 'item') {
                let itemFound = false;
                let idx = inventory.findIndex(i => i.name === robberDemandedItem.name);
                if(idx !== -1) {
                    inventory[idx].qty--;
                    if(inventory[idx].qty === 0) inventory.splice(idx, 1);
                    itemFound = true;
                }
                
                if(itemFound) {
                    renderShelves();
                    playThwack();
                    generateCustomerBelt();
                } else {
                    tipTotal = 0;
                    document.getElementById('tip-amount').innerText = "$0.00";
                    customAlert(`Since you didn't have any ${robberDemandedItem.name}, the robber emptied your tip jar.`);
                    playThwack();
                    generateCustomerBelt();
                }
            }
        }

            const modal=document.getElementById('robber-basket-modal');
            const eligible=inventory.filter(i=>i.qty>0&&i.category!=='Curiosities');
            window.robberEligible=eligible;
            window.robberBasketSelection={};

            let html=`<h3>Robber Basket</h3>
            <style>
            .rb-grid{display:flex;gap:10px;margin:10px 0;overflow-x:auto;flex-wrap:nowrap;padding-bottom:8px;}

            .rb-emoji{font-size:26px;}
            .rb-name{font-size:10px;min-height:24px;}
            .rb-qty{font-size:11px;font-weight:700;}
            </style><div class="rb-grid">`;

            eligible.forEach((i,n)=>{
                html+=`<div class="rb-item" id="rb-item-${n}" onclick="incrementRobberItem(${n})">
                <div class="rb-badge" onclick="event.stopPropagation();decrementRobberItem(${n})" id="rb-badge-${n}">0</div>
                <div class="rb-emoji">${i.emoji}</div>
